<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backstage — Task Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #f43f5e;
      --accent-light: #fbbf24;
      --bg: #000000;
      --bg-card: #0d0d0d;
      --bg-elevated: #1a1a1a;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(244,63,94,0.4);
      --text: #f0ece6;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --gradient: linear-gradient(135deg, #f43f5e 0%, #fbbf24 100%);
      --radius: 0.75rem;
      --radius-lg: 1rem;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --ease: cubic-bezier(0.4,0,0.2,1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .logo-icon {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 0.5rem;
      overflow: hidden;
    }

    .logo-icon svg { width: 100%; height: 100%; display: block; }

    .logo-text {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-sub {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
    }

    /* ── Phase Tabs ── */
    .phase-tabs {
      display: flex;
      gap: 0.25rem;
      padding: 0.75rem 2rem;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .phase-tab {
      padding: 0.5rem 1.25rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.25s var(--ease);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .phase-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    .phase-tab.active {
      background: var(--gradient);
      color: #000;
    }

    .phase-tab .count {
      background: rgba(0,0,0,0.2);
      padding: 0.1rem 0.5rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .phase-tab.active .count { background: rgba(0,0,0,0.3); }

    /* ── Board ── */
    .board {
      display: flex;
      gap: 1.25rem;
      padding: 1.5rem 2rem;
      overflow-x: auto;
      min-height: calc(100vh - 8rem);
      align-items: flex-start;
    }

    .column {
      min-width: 320px;
      max-width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: var(--bg-elevated);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .column-title {
      font-size: 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .column-count {
      background: rgba(255,255,255,0.08);
      padding: 0.15rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    /* ── Task Card ── */
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.125rem;
      cursor: pointer;
      transition: all 0.3s var(--ease);
    }

    .task-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(244,63,94,0.08);
    }

    .task-priority {
      display: inline-block;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      margin-bottom: 0.75rem;
    }

    .priority-critical { background: var(--gradient); }
    .priority-high { background: #f43f5e; }
    .priority-medium { background: #fbbf24; }
    .priority-low { background: #71717a; }

    .task-title {
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 0.375rem;
      line-height: 1.4;
    }

    .task-desc {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 0.75rem;
    }

    .task-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-bottom: 0.75rem;
    }

    .tag {
      padding: 0.2rem 0.6rem;
      border-radius: 0.375rem;
      font-size: 0.68rem;
      font-weight: 600;
      border: 1px solid;
    }

    .tag-auth { color: #818cf8; border-color: rgba(129,140,248,0.3); background: rgba(129,140,248,0.08); }
    .tag-group { color: #34d399; border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.08); }
    .tag-song { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.08); }
    .tag-admin { color: #f43f5e; border-color: rgba(244,63,94,0.3); background: rgba(244,63,94,0.08); }
    .tag-ui { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.08); }
    .tag-infra { color: #67e8f9; border-color: rgba(103,232,249,0.3); background: rgba(103,232,249,0.08); }
    .tag-player { color: #fb923c; border-color: rgba(251,146,60,0.3); background: rgba(251,146,60,0.08); }
    .tag-social { color: #f472b6; border-color: rgba(244,114,182,0.3); background: rgba(244,114,182,0.08); }

    .task-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .task-phase {
      padding: 0.15rem 0.5rem;
      border-radius: 0.25rem;
      font-weight: 600;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .phase-1 { background: rgba(244,63,94,0.15); color: #f43f5e; }
    .phase-2 { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .phase-3 { background: rgba(52,211,153,0.15); color: #34d399; }
    .phase-4 { background: rgba(129,140,248,0.15); color: #818cf8; }

    /* ── Summary Cards ── */
    .summary-bar {
      display: flex;
      gap: 1rem;
      padding: 1rem 2rem 0;
    }

    .summary-card {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      text-align: center;
    }

    .summary-num {
      font-size: 1.8rem;
      font-weight: 900;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .summary-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 0.25rem;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .header { padding: 0.75rem 1rem; }
      .phase-tabs { padding: 0.5rem 1rem; }
      .board { padding: 1rem; gap: 1rem; }
      .column { min-width: 280px; }
      .summary-bar { flex-direction: column; padding: 0.75rem 1rem 0; gap: 0.5rem; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="doorGlow" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#f43f5e" stop-opacity="1"/>
              <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.3"/>
            </linearGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect width="100" height="100" rx="24" fill="#1e1b4b"/>
          <polygon points="40,20 80,5 80,95 40,80" fill="url(#doorGlow)" filter="url(#glow)"/>
          <polygon points="40,20 60,25 60,75 40,80" fill="#312e81"/>
          <circle cx="45" cy="50" r="2" fill="#475569"/>
          <g transform="translate(65, 35) rotate(15)" fill="#fff" filter="url(#glow)">
            <circle cx="5" cy="20" r="6"/><circle cx="25" cy="15" r="6"/>
            <rect x="9" y="4" width="3" height="16"/><rect x="29" y="-1" width="3" height="16"/>
            <polygon points="9,4 32,-1 32,5 12,10"/>
          </g>
          <path d="M 85,20 L 87,25 L 92,27 L 87,29 L 85,34 L 83,29 L 78,27 L 83,25 Z" fill="#fbbf24" filter="url(#glow)"/>
          <path d="M 55,15 L 56,18 L 59,19 L 56,20 L 55,23 L 54,20 L 51,19 L 54,18 Z" fill="#f43f5e"/>
        </svg>
      </div>
      <span class="logo-text">Backstage</span>
    </div>
    <div class="header-sub">서비스 개발 로드맵 · Task Board</div>
  </div>

  <!-- Phase Tabs -->
  <div class="phase-tabs">
    <button class="phase-tab active" onclick="filterPhase('all', this)">전체 <span class="count" id="countAll">0</span></button>
    <button class="phase-tab" onclick="filterPhase('1', this)">🔴 Phase 1 · MVP <span class="count" id="count1">0</span></button>
    <button class="phase-tab" onclick="filterPhase('2', this)">🟡 Phase 2 · 그룹 <span class="count" id="count2">0</span></button>
    <button class="phase-tab" onclick="filterPhase('3', this)">🟢 Phase 3 · 플레이어 <span class="count" id="count3">0</span></button>
    <button class="phase-tab" onclick="filterPhase('4', this)">🟣 Phase 4 · 확장 <span class="count" id="count4">0</span></button>
  </div>

  <!-- Summary -->
  <div class="summary-bar">
    <div class="summary-card"><div class="summary-num" id="sumTotal">0</div><div class="summary-label">전체 태스크</div></div>
    <div class="summary-card"><div class="summary-num" id="sumTodo">0</div><div class="summary-label">대기</div></div>
    <div class="summary-card"><div class="summary-num" id="sumProgress">0</div><div class="summary-label">진행중</div></div>
    <div class="summary-card"><div class="summary-num" id="sumDone">0</div><div class="summary-label">완료</div></div>
  </div>

  <!-- Board -->
  <div class="board" id="board"></div>

  <script>
    const TASKS = [
      // ═══ Phase 1: MVP ═══
      { id: 1, title: 'DB 스키마 설계', desc: 'users 테이블 설계 완료. 기존 songs/parts 보존.', tags: ['infra'], phase: '1', status: 'done', priority: 'critical' },
      { id: 2, title: '회원가입/로그인', desc: 'bcrypt 해싱, JWT 7일. POST /api/auth/register, /login.', tags: ['auth'], phase: '1', status: 'done', priority: 'critical' },
      { id: 3, title: 'Google OAuth 2.0', desc: 'googleapis SDK. Account Linking. 프로필 연동. 초대코드 연동.', tags: ['auth'], phase: '1', status: 'done', priority: 'high' },
      { id: 4, title: '로그인/회원가입 UI', desc: 'login.html. 레트로 선셋 테마, 탭 전환, 비밀번호 강도.', tags: ['auth', 'ui'], phase: '1', status: 'done', priority: 'high' },
      { id: 5, title: 'JWT 미들웨어', desc: 'authMiddleware, optionalAuth. Bearer 토큰 검증.', tags: ['auth', 'infra'], phase: '1', status: 'done', priority: 'critical' },
      { id: 40, title: 'Backstage 브랜딩', desc: 'BandScore → Backstage. 파비콘, 타이틀, 메타태그 전체 교체.', tags: ['ui'], phase: '1', status: 'done', priority: 'critical' },
      { id: 41, title: '메인 페이지 UI 리디자인', desc: '레트로 선셋 CSS, 피치 블랙 배경, 서비스 푸터, 이스터에그.', tags: ['ui'], phase: '1', status: 'done', priority: 'high' },
      { id: 42, title: 'Task Board 생성', desc: 'taskboard.html. 4 Phase 칸반 보드, 필터/서머리.', tags: ['ui', 'infra'], phase: '1', status: 'done', priority: 'medium' },

      // ═══ Phase 2: Stage 시스템 ═══
      { id: 10, title: 'Stage CRUD', desc: 'stages 테이블. 생성/참가/탈퇴/삭제. 초대코드 8자리.', tags: ['group', 'infra'], phase: '2', status: 'done', priority: 'critical' },
      { id: 11, title: 'Stage 멤버 권한', desc: 'admin/editor/viewer 3단계. stage_members 테이블.', tags: ['group', 'auth'], phase: '2', status: 'done', priority: 'critical' },
      { id: 12, title: '사이드바 트리 네비게이션', desc: 'Stage > 곡 트리 구조. 접기/펼치기. 모바일 대응.', tags: ['ui', 'group'], phase: '2', status: 'done', priority: 'high' },
      { id: 13, title: '데이터 이관', desc: '기존 곡 → Stage 자동 이관. stage_id FK 적용.', tags: ['infra'], phase: '2', status: 'done', priority: 'high' },
      { id: 14, title: 'Stage 이모지 선택', desc: 'Stage 생성/수정 시 이모지 선택. emoji 컬럼.', tags: ['group', 'ui'], phase: '2', status: 'done', priority: 'medium' },

      // ═══ Phase 3: 플레이어 & 고도화 ═══
      { id: 20, title: '악보 업로드 권한 분리', desc: 'editor 이상만 곡 생성/수정/삭제/업로드. viewer는 조회만.', tags: ['song', 'auth'], phase: '3', status: 'done', priority: 'high' },
      { id: 22, title: '메모/주석 기능', desc: '악보 위 개인 메모 (포스트잇). 멤버 메모는 비공개.', tags: ['player', 'ui'], phase: '3', status: 'todo', priority: 'medium' },
      { id: 24, title: '사용 가이드 페이지', desc: 'guide.html 완성. 서비스 강점 중심 리라이트.', tags: ['ui'], phase: '3', status: 'done', priority: 'high' },
      { id: 25, title: '가이드 스크린샷 업데이트', desc: 'guide.html 내 가이드 이미지를 실제 스크린샷으로 교체.', tags: ['ui'], phase: '3', status: 'todo', priority: 'high' },
      { id: 45, title: 'Stage 채팅', desc: 'Socket.IO 실시간 채팅. stage_messages DB. 말풍선 UI. 뱃지.', tags: ['social', 'group'], phase: '3', status: 'done', priority: 'critical' },
      { id: 46, title: 'DM (1:1 메시지)', desc: 'direct_messages DB. Socket.IO. 대화 목록. 읽음/안읽음.', tags: ['social'], phase: '3', status: 'done', priority: 'high' },
      { id: 47, title: 'Stage 설정 편집', desc: 'Stage 이름, 설명 수정. PUT /api/stages/:id.', tags: ['group', 'admin'], phase: '3', status: 'done', priority: 'high' },
      { id: 48, title: '초대 URL 자동 참가', desc: '/invite/:code → 로그인/가입 → 자동 Stage 참가.', tags: ['group', 'social'], phase: '3', status: 'done', priority: 'critical' },

      // ═══ Phase 4: 관리자 & 확장 ═══
      { id: 30, title: 'Admin 대시보드', desc: '사용자/Stage/곡 통계. 최근 가입자. 서버 상태.', tags: ['admin', 'ui'], phase: '4', status: 'done', priority: 'critical' },
      { id: 31, title: 'Admin 회원 관리', desc: '회원 목록/검색/필터. 계정 비활성화/삭제.', tags: ['admin'], phase: '4', status: 'done', priority: 'critical' },
      { id: 32, title: 'Admin Stage 관리', desc: 'Stage 목록. 멤버/곡 통계. 강제 삭제.', tags: ['admin', 'group'], phase: '4', status: 'done', priority: 'high' },
      { id: 33, title: 'Admin 곡 관리', desc: '전체 곡 목록. 용량 확인. 파일 정리 도구.', tags: ['admin', 'song'], phase: '4', status: 'done', priority: 'high' },
      { id: 49, title: '관리자-회원 DM', desc: 'Admin에서 회원 DM 전송. 우측 슬라이드 채팅 패널.', tags: ['admin', 'social'], phase: '4', status: 'done', priority: 'high' },
      { id: 50, title: '관리자 만능 편집', desc: '회원/Stage/곡 정보 수정. 악보 바로 설정.', tags: ['admin'], phase: '4', status: 'done', priority: 'high' },
      { id: 34, title: '알림 시스템', desc: 'Stage 초대, 새 곡, 연습 시작 알림. 인앱+이메일.', tags: ['social', 'infra'], phase: '4', status: 'todo', priority: 'medium' },
      { id: 35, title: '배포 & 인프라', desc: 'Docker. nginx. SSL. 자동 백업. CI/CD.', tags: ['infra'], phase: '4', status: 'todo', priority: 'high' },
      { id: 36, title: 'PWA & 오프라인', desc: 'Service Worker 악보 캐싱. 오프라인 조회. 앱 설치.', tags: ['infra', 'ui'], phase: '4', status: 'todo', priority: 'low' },
      { id: 37, title: '디스코드 커뮤니티', desc: '디스코드 서버 개설 완료. 사이드바+푸터 링크 연동.', tags: ['social', 'ui'], phase: '4', status: 'done', priority: 'high' },
      { id: 51, title: '⚠️ PROD_URL 변경', desc: '정식 도메인/서버 이전 시 .env.production 변경 필요.', tags: ['infra'], phase: '4', status: 'todo', priority: 'high' },
      { id: 52, title: '도네이션(후원) 시스템', desc: '후원모달 + Admin 후원관리(등록/편집/삭제) + 롤링배너.', tags: ['infra', 'ui'], phase: '4', status: 'done', priority: 'high' },

      // ═══ 보안 & 방어 ═══
      { id: 53, title: '🔒 업로드 용량 제한', desc: 'DB: parts.file_size, songs.cover_size/inst_size 컬럼 추가. 서버시작 시 fs.statSync 백필. 업로드 시 req.file.size 저장. SUM 체크 500MB 초과 차단. Admin 유저별 용량 랭킹.', tags: ['infra', 'auth'], phase: '4', status: 'todo', priority: 'critical' },
      { id: 54, title: '🔒 API Rate Limiting', desc: 'express-rate-limit. 로그인 5회/분(IP), 가입 3회/시간, 업로드 10회/분, 채팅 30회/분, 전역 100회/분/IP.', tags: ['infra', 'auth'], phase: '4', status: 'todo', priority: 'critical' },
      { id: 55, title: '🔒 파일 검증 강화', desc: 'PDF 매직바이트(%PDF-). JPEG/PNG 매직바이트. PDF 20MB, 이미지 5MB, 음원 50MB. multer limits. 파일명 sanitize.', tags: ['infra'], phase: '4', status: 'todo', priority: 'high' },
      { id: 56, title: '🔒 스토리지 모니터링', desc: 'Admin 대시보드 스토리지 카드. uploads/ 크기. 유저별 용량 랭킹. 임계치 경고.', tags: ['infra', 'ui'], phase: '4', status: 'todo', priority: 'high' },
      { id: 57, title: '🔒 스팸 계정 방지', desc: 'IP 가입 제한(rate-limit). email_verified 차단(적용됨). 90일 미로그인 정리. 의심계정 알림.', tags: ['auth', 'infra'], phase: '4', status: 'todo', priority: 'medium' },
    ];


    const STATUS_COLS = [
      { key: 'todo', title: '📋 대기 (To Do)', icon: '📋' },
      { key: 'progress', title: '🔨 진행중', icon: '🔨' },
      { key: 'review', title: '👀 리뷰', icon: '👀' },
      { key: 'done', title: '✅ 완료', icon: '✅' },
    ];

    let currentPhase = 'all';

    function filterPhase(phase, btn) {
      currentPhase = phase;
      document.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderBoard();
    }

    function renderBoard() {
      const board = document.getElementById('board');
      const filtered = currentPhase === 'all' ? TASKS : TASKS.filter(t => t.phase === currentPhase);

      board.innerHTML = STATUS_COLS.map(col => {
        const colTasks = filtered.filter(t => t.status === col.key);
        return `
          <div class="column">
            <div class="column-header">
              <span class="column-title">${col.title}</span>
              <span class="column-count">${colTasks.length}</span>
            </div>
            ${colTasks.map(t => `
              <div class="task-card" data-phase="${t.phase}">
                <div class="task-priority priority-${t.priority}"></div>
                <div class="task-title">${t.title}</div>
                <div class="task-desc">${t.desc}</div>
                <div class="task-tags">${t.tags.map(tag => `<span class="tag tag-${tag}">${tag}</span>`).join('')}</div>
                <div class="task-footer">
                  <span class="task-phase phase-${t.phase}">Phase ${t.phase}</span>
                  <span>${t.priority === 'critical' ? '🔥 Critical' : t.priority === 'high' ? '⬆️ High' : t.priority === 'medium' ? '➡️ Medium' : '⬇️ Low'}</span>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }).join('');

      // Update counts
      const all = TASKS;
      document.getElementById('countAll').textContent = all.length;
      ['1','2','3','4'].forEach(p => {
        document.getElementById('count' + p).textContent = all.filter(t => t.phase === p).length;
      });

      document.getElementById('sumTotal').textContent = filtered.length;
      document.getElementById('sumTodo').textContent = filtered.filter(t => t.status === 'todo').length;
      document.getElementById('sumProgress').textContent = filtered.filter(t => t.status === 'progress').length;
      document.getElementById('sumDone').textContent = filtered.filter(t => t.status === 'done').length;
    }

    renderBoard();
  </script>
</body>
</html>
