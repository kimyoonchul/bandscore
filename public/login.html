<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backstage — 로그인</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #f43f5e; --accent-light: #fbbf24;
      --bg: #000; --bg-card: #0d0d0d; --bg-elevated: #1a1a1a;
      --border: rgba(255,255,255,0.08); --text: #f0ece6;
      --text-secondary: #a1a1aa; --text-muted: #71717a;
      --gradient: linear-gradient(135deg, #f43f5e 0%, #fbbf24 100%);
      --radius: 0.75rem; --ease: cubic-bezier(0.4,0,0.2,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(ellipse at 30% 20%, rgba(244,63,94,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(251,191,36,0.04) 0%, transparent 60%);
    }

    .split-layout {
      display: flex; min-height: 100vh; width: 100%;
    }
    .landing-pane {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      padding: 4rem 6rem; position: relative; z-index: 1;
    }
    .auth-pane {
      width: 480px; background: rgba(0,0,0,0.5); backdrop-filter: blur(24px);
      border-left: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
      padding: 2rem; position: relative; z-index: 2;
    }

    .auth-container { width: 100%; max-width: 380px; }

    .logo-wrap { margin-bottom: 2rem; }
    .logo-icon { width: 5rem; height: 5rem; margin-bottom: 1.5rem; border-radius: 1.25rem; overflow: hidden; box-shadow: 0 8px 32px rgba(244,63,94,0.2); }
    .logo-icon svg { width: 100%; height: 100%; display: block; }
    .logo-title { font-size: 3.5rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; margin-bottom: 1rem; }
    .logo-sub { color: var(--text-secondary); font-size: 1.25rem; margin-bottom: 2.5rem; line-height: 1.5; font-weight: 400; max-width: 500px; }

    .features { display: flex; flex-direction: column; gap: 1.25rem; margin-bottom: 3rem; }
    .feature-item { display: flex; align-items: center; gap: 1rem; }
    .feature-icon { width: 2.5rem; height: 2.5rem; border-radius: 50%; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; color: var(--accent-light); }
    .feature-text { font-size: 0.95rem; color: var(--text); font-weight: 500; }
    .feature-text span { display: block; font-size: 0.8rem; color: var(--text-muted); margin-top: 0.2rem; font-weight: 400; }

    .guide-link-btn {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.875rem 1.5rem;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 2rem; color: var(--text); text-decoration: none;
      font-weight: 600; font-size: 0.95rem; transition: all 0.2s; width: fit-content;
    }
    .guide-link-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); transform: translateY(-2px); }

    .auth-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 1.25rem; padding: 2rem; box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    .tab-switch {
      display: flex; gap: 0.25rem; background: var(--bg-elevated);
      border-radius: 0.625rem; padding: 0.25rem; margin-bottom: 1.75rem;
    }
    .tab-btn {
      flex: 1; padding: 0.625rem; border: none; background: transparent;
      color: var(--text-muted); font-family: inherit; font-size: 0.9rem;
      font-weight: 700; border-radius: 0.5rem; cursor: pointer; transition: all 0.25s var(--ease);
    }
    .tab-btn.active { background: var(--gradient); color: #000; }

    .form-group { margin-bottom: 1.125rem; }
    .form-group label {
      display: block; font-size: 0.75rem; font-weight: 600;
      color: var(--text-muted); margin-bottom: 0.375rem;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .form-input {
      width: 100%; padding: 0.75rem 1rem; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: inherit; font-size: 0.95rem;
      transition: all 0.25s var(--ease); outline: none;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(244,63,94,0.15); }
    .form-input::placeholder { color: var(--text-muted); }

    .submit-btn {
      width: 100%; padding: 0.875rem; border: none; border-radius: var(--radius);
      background: var(--gradient); color: #000; font-family: inherit;
      font-size: 1rem; font-weight: 800; cursor: pointer;
      transition: all 0.25s var(--ease); margin-top: 0.5rem;
      box-shadow: 0 4px 20px rgba(244,63,94,0.25);
    }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(244,63,94,0.35); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.2);
      color: #f87171; padding: 0.625rem 1rem; border-radius: var(--radius);
      font-size: 0.82rem; font-weight: 600; margin-bottom: 1rem;
      display: none; animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .success-msg {
      background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2);
      color: #34d399; padding: 0.625rem 1rem; border-radius: var(--radius);
      font-size: 0.82rem; font-weight: 600; margin-bottom: 1rem; display: none;
    }

    .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.75rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .skip-btn {
      display: block; width: 100%; text-align: center; margin-top: 1.25rem;
      color: var(--text-muted); font-size: 0.82rem; text-decoration: none;
      padding: 0.5rem; border-radius: var(--radius); transition: all 0.2s;
    }
    .skip-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .pw-strength { height: 3px; border-radius: 2px; margin-top: 0.375rem; transition: all 0.3s; }
    .pw-weak { background: #f43f5e; width: 33%; }
    .pw-medium { background: #fbbf24; width: 66%; }
    .pw-strong { background: #34d399; width: 100%; }

    .google-btn {
      width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border);
      border-radius: var(--radius); background: #fff; color: #3c4043;
      font-family: inherit; font-size: 0.92rem; font-weight: 600;
      cursor: pointer; transition: all 0.25s var(--ease);
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
    }
    .google-btn:hover {
      background: #f8f9fa; border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .google-btn:active { transform: scale(0.98); }
    .google-btn svg { width: 1.125rem; height: 1.125rem; flex-shrink: 0; }

    @media (max-width: 900px) {
      .split-layout { flex-direction: column; }
      .landing-pane { padding: 3rem 1.5rem; text-align: center; align-items: center; }
      .auth-pane { width: 100%; padding: 2rem 1.5rem; border-left: none; border-top: 1px solid var(--border); }
      .logo-icon { margin: 0 auto 1.5rem; }
      .features { align-items: center; text-align: left; }
    }
  </style>
</head>
<body>

<div class="split-layout">
  <div class="landing-pane">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="doorGlow" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#f43f5e" stop-opacity="1"/>
              <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.3"/>
            </linearGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect width="100" height="100" rx="24" fill="#1e1b4b"/>
          <polygon points="40,20 80,5 80,95 40,80" fill="url(#doorGlow)" filter="url(#glow)"/>
          <polygon points="40,20 60,25 60,75 40,80" fill="#312e81"/>
          <circle cx="45" cy="50" r="2" fill="#475569"/>
          <g transform="translate(65, 35) rotate(15)" fill="#fff" filter="url(#glow)">
            <circle cx="5" cy="20" r="6"/><circle cx="25" cy="15" r="6"/>
            <rect x="9" y="4" width="3" height="16"/><rect x="29" y="-1" width="3" height="16"/>
            <polygon points="9,4 32,-1 32,5 12,10"/>
          </g>
          <path d="M 85,20 L 87,25 L 92,27 L 87,29 L 85,34 L 83,29 L 78,27 L 83,25 Z" fill="#fbbf24" filter="url(#glow)"/>
        </svg>
      </div>
      <div class="logo-title">Backstage</div>
      <div class="logo-sub">무대에 오르기 전, 묵묵히 합을 맞추는 공간.<br>밴드 합주를 위한 악보 자동 넘김 서비스입니다.</div>
    </div>

    <div class="features">
      <div class="feature-item">
        <div class="feature-icon">📄</div>
        <div class="feature-text">
          악보 자동 넘김
          <span>BPM과 마디 수 기반으로 악보가 알아서 스크롤됩니다. 연주에만 집중하세요.</span>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">⚡</div>
        <div class="feature-text">
          실시간 합주 동기화
          <span>멤버들과 동시에 곡을 재생하고, 멈추고, 템포를 바꿀 수 있습니다.</span>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🎧</div>
        <div class="feature-text">
          Inst 음원 지원
          <span>반주 MR을 업로드하여 악보와 함께 재생하며 연습할 수 있습니다.</span>
        </div>
      </div>
    </div>

    <a href="/guide" target="_blank" class="guide-link-btn">
      📖 서비스 사용 가이드 보기 <span>→</span>
    </a>
  </div>

  <div class="auth-pane">
    <div class="auth-container">

  <div class="auth-card">
    <div class="tab-switch">
      <button class="tab-btn active" onclick="showTab('login')">로그인</button>
      <button class="tab-btn" onclick="showTab('register')">회원가입</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <!-- 로그인 -->
    <div id="loginPanel" class="form-panel active">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>이메일</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="example@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input class="form-input" type="password" id="loginPw" placeholder="비밀번호 입력" required autocomplete="current-password">
        </div>
        <button type="submit" class="submit-btn" id="loginBtn">로그인</button>
        <a href="/reset-password" style="display:block;text-align:center;margin-top:0.875rem;color:var(--text-muted);font-size:0.8rem;text-decoration:none;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-muted)'">비밀번호를 잊으셨나요?</a>
      </form>
      <div class="divider">또는</div>
      <button class="google-btn" onclick="googleLogin()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google로 계속하기
      </button>
    </div>

    <!-- 회원가입 -->
    <div id="registerPanel" class="form-panel">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>닉네임</label>
          <input class="form-input" type="text" id="regNick" placeholder="밴드에서 불릴 이름" required maxlength="20">
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input class="form-input" type="email" id="regEmail" placeholder="example@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input class="form-input" type="password" id="regPw" placeholder="6자 이상" required minlength="6" autocomplete="new-password" oninput="checkPwStrength(this.value)">
          <div class="pw-strength" id="pwStrength"></div>
        </div>
        <div class="form-group">
          <label>비밀번호 확인</label>
          <input class="form-input" type="password" id="regPwConfirm" placeholder="비밀번호 다시 입력" required autocomplete="new-password">
        </div>
        <button type="submit" class="submit-btn" id="regBtn">가입하기</button>
      </form>
      <div class="divider">또는</div>
      <button class="google-btn" onclick="googleLogin()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google로 계속하기
      </button>
    </div>
  </div>
  </div>
  </div>
</div>

<script>
  // URL 파라미터 파싱
  const urlParams = new URLSearchParams(window.location.search);

  // Google OAuth 콜백 토큰 처리
  const oauthToken = urlParams.get('token');
  const oauthUser = urlParams.get('user');
  const oauthError = urlParams.get('error');
  const oauthInvite = urlParams.get('invite');

  if (oauthToken && oauthUser) {
    // Google 로그인 성공 → 토큰 저장 후 이동
    localStorage.setItem('backstage_token', oauthToken);
    try {
      localStorage.setItem('backstage_user', decodeURIComponent(oauthUser));
    } catch(e) {
      localStorage.setItem('backstage_user', oauthUser);
    }
    // URL에서 토큰 파라미터 제거 (히스토리 보안)
    window.history.replaceState({}, '', '/login');
    if (oauthInvite) {
      joinByInvite(oauthInvite);
    } else {
      window.location.href = '/';
    }
  }

  if (oauthError) {
    setTimeout(() => {
      showError(decodeURIComponent(oauthError));
      // URL에서 에러 파라미터 제거
      window.history.replaceState({}, '', '/login');
    }, 100);
  }

  // 초대코드 감지 (URL: /invite/CODE)
  const inviteCode = window.location.pathname.startsWith('/invite/') ? window.location.pathname.split('/invite/')[1] : null;

  // 이미 로그인되어 있으면
  if (!oauthToken && localStorage.getItem('backstage_token')) {
    if (inviteCode) { joinByInvite(inviteCode); }
    else { window.location.href = '/'; }
  }

  // 초대코드가 있으면 안내 표시
  if (inviteCode) {
    setTimeout(() => {
      const el = document.getElementById('successMsg');
      el.textContent = '🎭 Stage 초대를 받았습니다! 로그인 또는 가입 후 자동 참가됩니다.';
      el.style.display = 'block';
    }, 100);
  }

  // Google 로그인 버튼 클릭
  function googleLogin() {
    const googleUrl = inviteCode ? `/auth/google?invite=${inviteCode}` : '/auth/google';
    window.location.href = googleUrl;
  }

  function showTab(tab) {
    document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
    document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    hideMessages();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  function checkPwStrength(pw) {
    const el = document.getElementById('pwStrength');
    el.className = 'pw-strength';
    if (pw.length < 6) { el.classList.add('pw-weak'); }
    else if (pw.length < 10 || !/[A-Z]/.test(pw) || !/[0-9]/.test(pw)) { el.classList.add('pw-medium'); }
    else { el.classList.add('pw-strong'); }
  }

  async function handleLogin(e) {
    e.preventDefault();
    hideMessages();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = '로그인 중...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPw').value
        })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error); return; }
      localStorage.setItem('backstage_token', data.token);
      localStorage.setItem('backstage_user', JSON.stringify(data.user));
      showSuccess('로그인 성공! 이동 중...');
      if (inviteCode) { await joinByInvite(inviteCode); }
      else { setTimeout(() => window.location.href = '/', 500); }
    } catch (e) {
      showError('서버에 연결할 수 없습니다');
    } finally {
      btn.disabled = false; btn.textContent = '로그인';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    hideMessages();
    const pw = document.getElementById('regPw').value;
    const pwConfirm = document.getElementById('regPwConfirm').value;
    if (pw !== pwConfirm) { showError('비밀번호가 일치하지 않습니다'); return; }

    const btn = document.getElementById('regBtn');
    btn.disabled = true; btn.textContent = '가입 중...';
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('regEmail').value,
          password: pw,
          nickname: document.getElementById('regNick').value
        })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error); return; }
      localStorage.setItem('backstage_token', data.token);
      localStorage.setItem('backstage_user', JSON.stringify(data.user));
      showSuccess('가입 완료! 이동 중...');
      if (inviteCode) { await joinByInvite(inviteCode); }
      else { setTimeout(() => window.location.href = '/', 500); }
    } catch (e) {
      showError('서버에 연결할 수 없습니다');
    } finally {
      btn.disabled = false; btn.textContent = '가입하기';
    }
  }

  async function joinByInvite(code) {
    try {
      const token = localStorage.getItem('backstage_token');
      const res = await fetch('/api/stages/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ invite_code: code })
      });
      const data = await res.json();
      if (res.ok) {
        showSuccess(`${data.message || 'Stage에 참가했습니다!'} 이동 중...`);
      } else if (res.status === 409) {
        showSuccess('이미 참가한 Stage입니다. 이동 중...');
      } else {
        showError(data.error || '초대코드 처리 실패');
      }
    } catch(e) { showError('서버 오류'); }
    setTimeout(() => window.location.href = '/', 1000);
  }
</script>
</body>
</html>
