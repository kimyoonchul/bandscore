<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 어쿠스틱 기타 스타일 - 심플하고 알아보기 쉽게 -->
  <!-- 바디 (8자 모양) -->
  <ellipse cx="16" cy="24" rx="11" ry="7.5" fill="#2d7a5a"/>
  <ellipse cx="16" cy="17" rx="8" ry="5.5" fill="#35946a"/>
  <!-- 사운드홀 -->
  <circle cx="16" cy="23" r="3.5" fill="#1a5c3f"/>
  <circle cx="16" cy="23" r="2.5" fill="#0d4a30"/>
  <!-- 넥 -->
  <rect x="14" y="1" width="4" height="14" rx="1" fill="#d4a574"/>
  <!-- 헤드 -->
  <rect x="13.5" y="0" width="5" height="3" rx="1.5" fill="#c49464"/>
  <!-- 줄 -->
  <line x1="15" y1="3" x2="15" y2="27" stroke="rgba(255,255,255,0.4)" stroke-width="0.4"/>
  <line x1="16" y1="3" x2="16" y2="27" stroke="rgba(255,255,255,0.4)" stroke-width="0.4"/>
  <line x1="17" y1="3" x2="17" y2="27" stroke="rgba(255,255,255,0.4)" stroke-width="0.4"/>
  <!-- 브릿지 -->
  <rect x="13.5" y="27" width="5" height="1" rx="0.5" fill="#c49464"/>
</svg>
