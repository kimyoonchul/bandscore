<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="doorGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 배경 -->
  <rect width="32" height="32" rx="7.5" fill="#1e1b4b"/>
  <!-- 새어나오는 빛 -->
  <polygon points="13,6.4 25.6,1.6 25.6,30.4 13,25.6" fill="url(#doorGlow)" filter="url(#glow)"/>
  <!-- 열린 문 -->
  <polygon points="13,6.4 19.2,8 19.2,24 13,25.6" fill="#312e81"/>
  <!-- 문 손잡이 -->
  <circle cx="14.4" cy="16" r="0.64" fill="#475569"/>
  <!-- 음표 -->
  <g transform="translate(20.8, 11.2) rotate(15)" fill="#fff" filter="url(#glow)">
    <circle cx="1.6" cy="6.4" r="1.9"/>
    <circle cx="8" cy="4.8" r="1.9"/>
    <rect x="2.9" y="1.3" width="1" height="5.1"/>
    <rect x="9.3" y="-0.3" width="1" height="5.1"/>
    <polygon points="2.9,1.3 10.2,-0.3 10.2,1.3 3.8,3.2"/>
  </g>
  <!-- 반짝이 -->
  <path d="M 27.2,6.4 L 27.8,8 L 29.4,8.6 L 27.8,9.3 L 27.2,10.9 L 26.6,9.3 L 25,8.6 L 26.6,8 Z" fill="#fbbf24" filter="url(#glow)"/>
  <path d="M 17.6,4.8 L 17.9,5.8 L 18.9,6.1 L 17.9,6.4 L 17.6,7.4 L 17.3,6.4 L 16.3,6.1 L 17.3,5.8 Z" fill="#f43f5e"/>
</svg>
