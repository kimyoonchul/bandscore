<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 5 58 57">
  <g transform="rotate(-45 32 32)">
    <!-- Body Drop Shadow -->
    <path d="M 32 61 C 51 61 53 46 49 39 C 46 34 47 29 45 25 C 43 21 41 23 39 27 C 37 29 35 29 32 29 C 29 29 27 29 25 27 C 23 23 21 21 19 25 C 17 29 18 34 15 39 C 11 46 13 61 32 61 Z" fill="#1A237E" opacity="0.3" transform="translate(1, 2)"/>
    
    <!-- Body -->
    <path d="M 32 60 C 50 60 52 45 48 38 C 45 33 46 28 44 24 C 42 20 40 22 38 26 C 36 28 34 28 32 28 C 30 28 28 28 26 26 C 24 22 22 20 20 24 C 18 28 19 33 16 38 C 12 45 14 60 32 60 Z" fill="#2962FF"/>
    
    <!-- Body Highlight/Contour -->
    <path d="M 32 58 C 46 58 48 45 45 39 C 43 35 44 30 42 27 C 41 25 40 25 38 27 C 36 29 34 29 32 29 C 30 29 28 29 26 27 C 24 25 23 25 22 27 C 20 30 21 35 19 39 C 16 45 18 58 32 58 Z" fill="#448AFF"/>

    <!-- Pickguard -->
    <path d="M 32 52 C 40 52 42 42 39 36 C 38 34 35 34 32 36 C 29 34 26 34 25 36 C 22 42 24 52 32 52 Z" fill="#FFFFFF" opacity="0.9"/>
    
    <!-- Neck -->
    <rect x="29" y="10" width="6" height="20" fill="#4E342E"/>
    
    <!-- Frets -->
    <line x1="29" y1="12" x2="35" y2="12" stroke="#D7CCC8" stroke-width="0.5"/>
    <line x1="29" y1="15" x2="35" y2="15" stroke="#D7CCC8" stroke-width="0.5"/>
    <line x1="29" y1="18" x2="35" y2="18" stroke="#D7CCC8" stroke-width="0.5"/>
    <line x1="29" y1="21" x2="35" y2="21" stroke="#D7CCC8" stroke-width="0.5"/>
    <line x1="29" y1="24" x2="35" y2="24" stroke="#D7CCC8" stroke-width="0.5"/>
    <line x1="29" y1="27" x2="35" y2="27" stroke="#D7CCC8" stroke-width="0.5"/>
    
    <!-- Fret Markers -->
    <circle cx="32" cy="13.5" r="0.8" fill="#EFEBE9"/>
    <circle cx="32" cy="19.5" r="0.8" fill="#EFEBE9"/>
    <circle cx="32" cy="25.5" r="0.8" fill="#EFEBE9"/>

    <!-- Headstock -->
    <path d="M 29 10 L 27 4 Q 32 1 37 4 L 35 10 Z" fill="#1A237E"/>
    
    <!-- Tuning Pegs -->
    <circle cx="26" cy="5" r="1.5" fill="#B0BEC5"/>
    <circle cx="27" cy="8" r="1.5" fill="#B0BEC5"/>
    <circle cx="38" cy="5" r="1.5" fill="#B0BEC5"/>
    <circle cx="37" cy="8" r="1.5" fill="#B0BEC5"/>
    
    <!-- Peg stems -->
    <line x1="26" y1="5" x2="28" y2="5" stroke="#90A4AE" stroke-width="1"/>
    <line x1="27" y1="8" x2="29" y2="8" stroke="#90A4AE" stroke-width="1"/>
    <line x1="38" y1="5" x2="36" y2="5" stroke="#90A4AE" stroke-width="1"/>
    <line x1="37" y1="8" x2="35" y2="8" stroke="#90A4AE" stroke-width="1"/>

    <!-- Pickups -->
    <rect x="27" y="38" width="10" height="3" rx="1" fill="#212121"/>
    <circle cx="28.5" cy="39.5" r="0.4" fill="#9E9E9E"/>
    <circle cx="30.5" cy="39.5" r="0.4" fill="#9E9E9E"/>
    <circle cx="32.5" cy="39.5" r="0.4" fill="#9E9E9E"/>
    <circle cx="34.5" cy="39.5" r="0.4" fill="#9E9E9E"/>
    
    <rect x="27" y="43" width="10" height="3" rx="1" fill="#212121"/>
    <circle cx="28.5" cy="44.5" r="0.4" fill="#9E9E9E"/>
    <circle cx="30.5" cy="44.5" r="0.4" fill="#9E9E9E"/>
    <circle cx="32.5" cy="44.5" r="0.4" fill="#9E9E9E"/>
    <circle cx="34.5" cy="44.5" r="0.4" fill="#9E9E9E"/>

    <!-- Bridge -->
    <rect x="26" y="50" width="12" height="4" rx="1" fill="#B0BEC5"/>
    <rect x="27" y="51" width="1.5" height="2" fill="#78909C"/>
    <rect x="29" y="51" width="1.5" height="2" fill="#78909C"/>
    <rect x="31" y="51" width="1.5" height="2" fill="#78909C"/>
    <rect x="33" y="51" width="1.5" height="2" fill="#78909C"/>

    <!-- Strings -->
    <line x1="29.8" y1="4" x2="29.8" y2="52" stroke="#E0E0E0" stroke-width="0.6"/>
    <line x1="31.2" y1="4" x2="31.2" y2="52" stroke="#E0E0E0" stroke-width="0.6"/>
    <line x1="32.8" y1="4" x2="32.8" y2="52" stroke="#E0E0E0" stroke-width="0.6"/>
    <line x1="34.2" y1="4" x2="34.2" y2="52" stroke="#E0E0E0" stroke-width="0.6"/>
    
    <!-- Knobs -->
    <circle cx="21" cy="46" r="2.5" fill="#424242"/>
    <circle cx="21" cy="46" r="1.5" fill="#757575"/>
    
    <circle cx="23" cy="53" r="2.5" fill="#424242"/>
    <circle cx="23" cy="53" r="1.5" fill="#757575"/>
    
    <circle cx="41" cy="48" r="2.5" fill="#424242"/>
    <circle cx="41" cy="48" r="1.5" fill="#757575"/>
  </g>
