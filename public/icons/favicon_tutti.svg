<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="tuttiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--accent-light, #fbbf24)" />
      <stop offset="100%" stop-color="var(--accent, #ea580c)" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="100" height="100" rx="24" fill="var(--bg, #0f172a)" />

  <!-- 합주를 상징하는 원형 웨이브 링 -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="var(--bg-dark, #1e293b)" stroke-width="4" />
  <circle cx="50" cy="50" r="25" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="4 4" />

  <!-- T 문자 (볼드하고 리듬감 있게) -->
  <path d="M 25,30 Q 50,25 75,30 L 75,42 Q 55,38 55,42 L 55,80 L 41,80 L 41,42 Q 41,38 25,42 Z" fill="url(#tuttiGrad)" filter="url(#shadow)" />

  <!-- T를 감싸는/겹치는 음악 기호 -->
  <g transform="translate(48, 30) scale(0.9)" fill="#ffffff" filter="url(#shadow)">
    <circle cx="15" cy="40" r="10" />
    <rect x="21" y="0" width="4" height="40" />
    <path d="M 21,0 C 35,-5 45,10 40,20 C 35,10 25,5 21,10 Z" />
  </g>
</svg>
