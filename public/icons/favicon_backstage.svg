<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="doorGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--accent, #f59e0b)" stop-opacity="1" />
      <stop offset="100%" stop-color="var(--accent-light, #fbbf24)" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="100" height="100" rx="24" fill="var(--bg, #0f172a)" />
  
  <!-- 새어나오는 빛 -->
  <polygon points="40,20 80,5 80,95 40,80" fill="url(#doorGlow)" filter="url(#glow)" />
  
  <!-- 열린 문 (어두운 실내) -->
  <polygon points="40,20 60,25 60,75 40,80" fill="var(--bg-dark, #1e293b)" />
  
  <!-- 문 손잡이 -->
  <circle cx="45" cy="50" r="2" fill="#475569" />

  <!-- 떠오르는 음표 -->
  <g transform="translate(65, 35) rotate(15)" fill="#ffffff" filter="url(#glow)">
    <circle cx="5" cy="20" r="6" />
    <circle cx="25" cy="15" r="6" />
    <rect x="9" y="4" width="3" height="16" />
    <rect x="29" y="-1" width="3" height="16" />
    <polygon points="9,4 32,-1 32,5 12,10" />
  </g>
  
  <!-- 반짝이 파티클 -->
  <path d="M 85,20 L 87,25 L 92,27 L 87,29 L 85,34 L 83,29 L 78,27 L 83,25 Z" fill="var(--accent-light, #fbbf24)" filter="url(#glow)" />
  <path d="M 55,15 L 56,18 L 59,19 L 56,20 L 55,23 L 54,20 L 51,19 L 54,18 Z" fill="var(--accent, #fcd34d)" />
</svg>
