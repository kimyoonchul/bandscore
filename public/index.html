<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AsomeScorePlayer - 밴드 악보 자동 넘김</title>
  <meta name="description" content="밴드 연주용 악보 자동 넘김 및 실시간 동기화 웹앱">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

  <header class="app-header">
    <div class="app-logo"><span class="icon">🎸</span> AsomeScorePlayer</div>
    <button class="btn btn-primary" id="btnNewSong" onclick="showNewSongModal()">＋ 새 곡</button>
  </header>

  <div class="container" id="mainContainer">
    <!-- Song List View -->
    <div id="songListView">
      <div id="songGrid" class="song-grid"></div>
      <div id="emptyState" class="empty-state" style="display:none">
        <div class="icon">🎸</div>
        <p>아직 등록된 곡이 없습니다</p>
        <button class="btn btn-primary btn-lg" onclick="showNewSongModal()">첫 번째 곡 만들기</button>
      </div>
    </div>

    <!-- Song Detail View -->
    <div id="songDetailView" style="display:none">
      <div class="song-detail-header">
        <div>
          <button class="btn btn-ghost btn-sm" onclick="showSongList()">← 목록</button>
          <h1 id="detailSongName" style="display:inline;margin-left:12px;font-size:1.5rem"></h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="showEditSongModal()">⚙️ 설정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteSong()">🗑️ 삭제</button>
        </div>
      </div>

      <!-- Song Settings Quick View -->
      <div class="card" style="margin-bottom:20px">
        <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center">
          <div><span style="color:var(--text-muted);font-size:0.85rem">BPM</span>
            <div style="font-size:1.8rem;font-weight:800;color:var(--primary)" id="detailBpm">120</div>
          </div>
          <div><span style="color:var(--text-muted);font-size:0.85rem">박자</span>
            <div style="font-size:1.3rem;font-weight:700" id="detailTimeSignature">4/4</div>
          </div>
          <div><span style="color:var(--text-muted);font-size:0.85rem">카운트인</span>
            <div style="font-size:1.3rem;font-weight:700" id="detailCountIn">2마디</div>
          </div>
        </div>
      </div>

      <!-- Parts (탭 없이 바로 표시) -->
      <div id="tabParts">
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
          <button class="btn btn-accent" onclick="showUploadModal()">📄 악보 업로드</button>
          <button class="btn btn-ghost" onclick="showCoverUpload()">🖼️ 커버 변경</button>
          <button class="btn btn-ghost" onclick="showInstUpload()">🎵 inst 업로드</button>
        </div>
        <div id="partsList" class="parts-list"></div>
      </div>

      <!-- Sections Tab -->
      <div id="tabSections" style="display:none">
        <h3 style="margin-bottom:12px">섹션 정의</h3>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px">곡의 구간을 정의하세요 (Intro, Verse, Chorus 등)
        </p>
        <button class="btn btn-sm btn-ghost" onclick="addSection()">＋ 섹션 추가</button>
        <div id="sectionList" class="section-list"></div>
        <button class="btn btn-primary btn-sm" onclick="saveSections()" style="margin-top:12px">💾 섹션 저장</button>

        <h3 style="margin:24px 0 12px">곡 흐름 (도돌이표 등)</h3>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px">섹션을 클릭해서 순서를 추가하세요. 반복도 가능합니다.</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px" id="sectionButtons"></div>
        <div id="flowEditor" class="flow-editor"></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-primary btn-sm" onclick="saveFlow()">💾 흐름 저장</button>
          <button class="btn btn-ghost btn-sm" onclick="clearFlow()">🔄 초기화</button>
        </div>
      </div>
    </div>
  </div>

  <!-- New Song Modal -->
  <div class="modal-overlay" id="newSongModal">
    <div class="modal">
      <div class="modal-title">🎸 새 곡 만들기</div>
      <div class="form-group">
        <label>곡 이름</label>
        <input class="form-control" id="newSongName" placeholder="곡 제목을 입력하세요">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>BPM</label>
          <input class="form-control" id="newSongBpm" type="number" value="120" min="30" max="300">
        </div>
        <div class="form-group">
          <label>박자</label>
          <select class="form-control" id="newSongTime">
            <option value="4/4">4/4</option>
            <option value="3/4">3/4</option>
            <option value="6/8">6/8</option>
            <option value="2/4">2/4</option>
          </select>
        </div>
        <div class="form-group">
          <label>카운트인 (마디)</label>
          <input class="form-control" id="newSongCountIn" type="number" value="2" min="1" max="4">
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-ghost" onclick="closeModal('newSongModal')">취소</button>
        <button class="btn btn-primary" onclick="createSong()">만들기</button>
      </div>
    </div>
  </div>

  <!-- Upload Part Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <div class="modal-title">📄 악보 업로드</div>
      <div class="form-group">
        <label>파트 이름</label>
        <select class="form-control" id="uploadPartName">
          <option value="드럼">🥁 드럼</option>
          <option value="베이스">🎸 베이스</option>
          <option value="일렉기타">🎸 일렉기타</option>
          <option value="일렉기타2">🎸 일렉기타2</option>
          <option value="어쿠스틱기타">🎸 어쿠스틱기타</option>
          <option value="키보드">🎹 키보드</option>
          <option value="보컬">🎤 보컬</option>
          <option value="기타">📄 기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>PDF 파일</label>
        <input type="file" class="form-control" id="uploadPdfFile" accept="application/pdf"
          onchange="onPdfSelected(this)">
      </div>
      <div id="uploadPreview" style="display:none">
        <div class="form-group">
          <label>감지된 페이지 수</label>
          <input class="form-control" id="uploadTotalPages" type="number" min="1" value="1" readonly>
        </div>
        <h4 style="margin:12px 0 8px">페이지별 마디 수 설정</h4>
        <p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:8px">각 페이지에 몇 마디가 있는지 입력하세요 (자동 스크롤 속도 계산에 사용)
        </p>
        <div id="pageSettingsContainer"></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-ghost" onclick="closeModal('uploadModal')">취소</button>
        <button class="btn btn-primary" id="btnUpload" onclick="uploadPart()" disabled>업로드</button>
      </div>
    </div>
  </div>

  <!-- Edit Song Modal -->
  <div class="modal-overlay" id="editSongModal">
    <div class="modal">
      <div class="modal-title">⚙️ 곡 설정</div>
      <div class="form-group">
        <label>곡 이름</label>
        <input class="form-control" id="editSongName">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>BPM</label>
          <input class="form-control" id="editSongBpm" type="number" min="30" max="300">
        </div>
        <div class="form-group">
          <label>박자</label>
          <select class="form-control" id="editSongTime">
            <option value="4/4">4/4</option>
            <option value="3/4">3/4</option>
            <option value="6/8">6/8</option>
            <option value="2/4">2/4</option>
          </select>
        </div>
        <div class="form-group">
          <label>카운트인 (마디)</label>
          <input class="form-control" id="editSongCountIn" type="number" min="1" max="4">
        </div>
      </div>
      <div class="form-group" style="margin-top:16px">
        <label>커버 이미지</label>
        <div class="cover-upload">
          <div class="cover-preview" id="editCoverPreview"><span class="placeholder">🎸</span></div>
          <div>
            <input type="file" id="editCoverFile" accept="image/*" style="font-size:0.85rem">
            <p style="color:var(--text-muted);font-size:0.75rem;margin-top:4px">정사각형 이미지 권장</p>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>inst 음원 (mp3/wav)</label>
        <input type="file" class="form-control" id="editInstFile" accept="audio/*" style="font-size:0.85rem">
        <p style="color:var(--text-muted);font-size:0.75rem;margin-top:4px" id="instStatus"></p>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn btn-ghost" onclick="closeModal('editSongModal')">취소</button>
        <button class="btn btn-primary" onclick="updateSong()">저장</button>
      </div>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let songs = [];
    let currentSong = null;
    let currentFlow = [];

    // ── API Helpers ──
    async function api(url, opts = {}) {
      const r = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
        body: opts.body ? JSON.stringify(opts.body) : undefined
      });
      return r.json();
    }

    // ── Modal ──
    function showModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    // ── Song List ──
    async function loadSongs() {
      songs = await api('/api/songs');
      renderSongList();
    }

    function renderSongList() {
      const grid = document.getElementById('songGrid');
      const empty = document.getElementById('emptyState');
      if (songs.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      grid.innerHTML = songs.map(s => `
    <div class="album-card" onclick="openSong('${s.id}')">
      <div class="album-cover">
        ${s.cover_filename
          ? `<img src="/uploads/${s.cover_filename}" alt="${esc(s.name)}">`
          : `<div class="album-placeholder">🎸</div>`}
        <div class="album-overlay">
          <button class="album-play" onclick="event.stopPropagation();openSong('${s.id}')">▶</button>
        </div>
      </div>
      <div class="album-title">${esc(s.name)}</div>
      <div class="album-meta">
        <span class="badge">♩ ${s.bpm}</span>
        <span class="badge">${s.partCount || 0} 파트</span>
      </div>
    </div>
  `).join('');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ── New Song ──
    function showNewSongModal() {
      document.getElementById('newSongName').value = '';
      document.getElementById('newSongBpm').value = '120';
      document.getElementById('newSongTime').value = '4/4';
      document.getElementById('newSongCountIn').value = '2';
      showModal('newSongModal');
      document.getElementById('newSongName').focus();
    }

    async function createSong() {
      const name = document.getElementById('newSongName').value.trim();
      if (!name) return alert('곡 이름을 입력하세요');
      await api('/api/songs', {
        method: 'POST',
        body: {
          name,
          bpm: parseInt(document.getElementById('newSongBpm').value) || 120,
          time_signature: document.getElementById('newSongTime').value,
          count_in_bars: parseInt(document.getElementById('newSongCountIn').value) || 2
        }
      });
      closeModal('newSongModal');
      await loadSongs();
    }

    // ── Song Detail ──
    async function openSong(id) {
      currentSong = await api(`/api/songs/${id}`);
      document.getElementById('songListView').style.display = 'none';
      document.getElementById('songDetailView').style.display = 'block';
      renderSongDetail();
    }

    function showSongList() {
      document.getElementById('songListView').style.display = 'block';
      document.getElementById('songDetailView').style.display = 'none';
      loadSongs();
    }

    function renderSongDetail() {
      const s = currentSong;
      document.getElementById('detailSongName').textContent = s.name;
      document.getElementById('detailBpm').textContent = s.bpm;
      document.getElementById('detailTimeSignature').textContent = s.time_signature;
      document.getElementById('detailCountIn').textContent = s.count_in_bars + '마디';
      renderParts();
      renderSections();
      renderFlowEditor();
    }

    function renderParts() {
      const list = document.getElementById('partsList');
      if (!currentSong.parts.length) {
        list.innerHTML = '<div class="empty-state" style="padding:30px"><p>아직 업로드된 악보가 없습니다</p></div>';
        return;
      }
      list.innerHTML = currentSong.parts.map(p => {
        const hasSystems = p.systems && p.systems.length > 0;
        const sysCount = hasSystems ? p.systems.length : 0;
        return `
    <div class="part-item card-clickable" style="flex-wrap:wrap;cursor:pointer" onclick="openPlayer('${p.id}')">
      <div style="flex:1;min-width:200px">
        <div class="part-name">${esc(p.name)}</div>
        <div class="part-info">${esc(p.original_filename)} · ${p.total_pages}페이지
          ${hasSystems ? ' · <span style="color:var(--success)">✓ ' + sysCount + '줄 감지됨</span>' : ''}
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap" onclick="event.stopPropagation()">
        <button class="btn btn-accent btn-sm" onclick="detectSystems('${p.id}')">🔍 줄감지</button>
        ${hasSystems ? '<button class="btn btn-ghost btn-sm" onclick="editExistingSystems(\'' + p.id + '\')">✏️ 줄설정</button>' : ''}
        <button class="btn btn-danger btn-sm" onclick="deletePart('${p.id}')">🗑️</button>
      </div>
    </div>
  `}).join('');
    }

    function openPlayer(partId) {
      window.open(`/player.html?songId=${currentSong.id}&partId=${partId}`, '_blank');
    }

    // ── Upload ──
    function showUploadModal() {
      document.getElementById('uploadPdfFile').value = '';
      document.getElementById('uploadPreview').style.display = 'none';
      document.getElementById('btnUpload').disabled = true;
      showModal('uploadModal');
    }

    async function onPdfSelected(input) {
      if (!input.files.length) return;
      const file = input.files[0];
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      const total = pdf.numPages;
      document.getElementById('uploadTotalPages').value = total;
      document.getElementById('uploadPreview').style.display = 'block';
      document.getElementById('btnUpload').disabled = false;

      let html = '<table class="page-settings-table"><tr><th>페이지</th><th>마디 수</th></tr>';
      for (let i = 1; i <= total; i++) {
        html += `<tr><td>${i}</td><td><input class="form-control" type="number" value="4" min="1" max="50" data-page="${i}"></td></tr>`;
      }
      html += '</table>';
      document.getElementById('pageSettingsContainer').innerHTML = html;
    }

    async function uploadPart() {
      const file = document.getElementById('uploadPdfFile').files[0];
      if (!file) return;
      const totalPages = document.getElementById('uploadTotalPages').value;
      const name = document.getElementById('uploadPartName').value;

      const fd = new FormData();
      fd.append('pdf', file);
      fd.append('name', name);
      fd.append('totalPages', totalPages);

      const r = await fetch(`/api/songs/${currentSong.id}/parts`, { method: 'POST', body: fd });
      const part = await r.json();

      // Save page measures
      const inputs = document.querySelectorAll('#pageSettingsContainer input[data-page]');
      const pages = Array.from(inputs).map(inp => ({
        page_number: parseInt(inp.dataset.page),
        measures: parseInt(inp.value) || 4
      }));
      await api(`/api/parts/${part.id}/pages`, { method: 'PUT', body: { pages } });

      closeModal('uploadModal');
      await openSong(currentSong.id);

      // Auto-detect systems after upload (자동 실행)
      await detectSystems(part.id);
    }

    async function deletePart(id) {
      if (!confirm('이 악보를 삭제하시겠습니까?')) return;
      await api(`/api/parts/${id}`, { method: 'DELETE' });
      await openSong(currentSong.id);
    }

    async function editPageSettings(partId) {
      const part = currentSong.parts.find(p => p.id === partId);
      if (!part) return;
      let html = `<div class="modal-title">📏 마디 설정 - ${esc(part.name)}</div>`;
      html += '<table class="page-settings-table"><tr><th>페이지</th><th>마디 수</th></tr>';
      for (let i = 0; i < part.total_pages; i++) {
        const pg = part.pages[i];
        html += `<tr><td>${i + 1}</td><td><input class="form-control" type="number" value="${pg ? pg.measures : 4}" min="1" max="50" data-page="${i + 1}"></td></tr>`;
      }
      html += '</table>';
      html += `<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
    <button class="btn btn-ghost" onclick="closeModal('editSongModal')">취소</button>
    <button class="btn btn-primary" onclick="savePageSettings('${partId}')">저장</button></div>`;
      document.querySelector('#editSongModal .modal').innerHTML = html;
      showModal('editSongModal');
    }

    async function savePageSettings(partId) {
      const inputs = document.querySelectorAll('#editSongModal input[data-page]');
      const pages = Array.from(inputs).map(inp => ({
        page_number: parseInt(inp.dataset.page),
        measures: parseInt(inp.value) || 4
      }));
      await api(`/api/parts/${partId}/pages`, { method: 'PUT', body: { pages } });
      closeModal('editSongModal');
      await openSong(currentSong.id);
    }

    // ── Song Settings ──
    function showEditSongModal() {
      const s = currentSong;
      const coverImg = s.cover_filename ? `<img src="/uploads/${s.cover_filename}">` : '<span class="placeholder">🎸</span>';
      const instInfo = s.inst_filename ? '✅ inst 음원 등록됨' : '';
      document.querySelector('#editSongModal .modal').innerHTML = `
    <div class="modal-title">⚙️ 곡 설정</div>
    <div class="form-group"><label>곡 이름</label><input class="form-control" id="editSongName" value="${esc(s.name)}"></div>
    <div class="form-row">
      <div class="form-group"><label>BPM</label><input class="form-control" id="editSongBpm" type="number" value="${s.bpm}" min="30" max="300"></div>
      <div class="form-group"><label>박자</label><select class="form-control" id="editSongTime">
        <option value="4/4" ${s.time_signature === '4/4' ? 'selected' : ''}>4/4</option>
        <option value="3/4" ${s.time_signature === '3/4' ? 'selected' : ''}>3/4</option>
        <option value="6/8" ${s.time_signature === '6/8' ? 'selected' : ''}>6/8</option>
        <option value="2/4" ${s.time_signature === '2/4' ? 'selected' : ''}>2/4</option>
      </select></div>
      <div class="form-group"><label>카운트인 (마디)</label><input class="form-control" id="editSongCountIn" type="number" value="${s.count_in_bars}" min="1" max="4"></div>
    </div>
    <div class="form-group" style="margin-top:16px">
      <label>커버 이미지</label>
      <div class="cover-upload">
        <div class="cover-preview" id="editCoverPreview">${coverImg}</div>
        <div>
          <input type="file" id="editCoverFile" accept="image/*" style="font-size:0.85rem">
          <p style="color:var(--text-muted);font-size:0.75rem;margin-top:4px">정사각형 이미지 권장</p>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>inst 음원 (mp3/wav)</label>
      <input type="file" class="form-control" id="editInstFile" accept="audio/*" style="font-size:0.85rem">
      <p style="color:var(--text-muted);font-size:0.75rem;margin-top:4px" id="instStatus">${instInfo}</p>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeModal('editSongModal')">취소</button>
      <button class="btn btn-primary" onclick="updateSong()">저장</button>
    </div>`;
      showModal('editSongModal');
    }

    async function updateSong() {
      // Save basic info
      await api(`/api/songs/${currentSong.id}`, {
        method: 'PUT',
        body: {
          name: document.getElementById('editSongName').value.trim(),
          bpm: parseInt(document.getElementById('editSongBpm').value),
          time_signature: document.getElementById('editSongTime').value,
          count_in_bars: parseInt(document.getElementById('editSongCountIn').value)
        }
      });
      // Upload cover if selected
      const coverFile = document.getElementById('editCoverFile');
      if (coverFile && coverFile.files.length > 0) {
        const fd = new FormData();
        fd.append('cover', coverFile.files[0]);
        await fetch(`/api/songs/${currentSong.id}/cover`, { method: 'POST', body: fd });
      }
      // Upload inst if selected
      const instFile = document.getElementById('editInstFile');
      if (instFile && instFile.files.length > 0) {
        const fd = new FormData();
        fd.append('inst', instFile.files[0]);
        await fetch(`/api/songs/${currentSong.id}/inst`, { method: 'POST', body: fd });
      }
      closeModal('editSongModal');
      await openSong(currentSong.id);
    }

    function showCoverUpload() { showEditSongModal(); }
    function showInstUpload() { showEditSongModal(); }

    async function deleteSong() {
      if (!confirm(`"${currentSong.name}" 을(를) 삭제하시겠습니까?`)) return;
      await api(`/api/songs/${currentSong.id}`, { method: 'DELETE' });

    }

    // ── Tabs ──
    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tabParts').style.display = tab === 'parts' ? 'block' : 'none';
      document.getElementById('tabSections').style.display = tab === 'sections' ? 'block' : 'none';

    // ── Sections ──
    function renderSections() {
      const list = document.getElementById('sectionList');
      const sections = currentSong.sections || [];
      list.innerHTML = sections.map((s, i) => `
    <div class="section-item">
      <input class="form-control section-name-input" value="${esc(s.name)}" data-idx="${i}" placeholder="이름">

    function addSection() {
      if (!currentSong.sections) currentSong.sections = [];
      const last = currentSong.sections[currentSong.sections.length - 1];
      const start = last ? last.end_measure + 1 : 1;
      currentSong.sections.push({ name: '', start_measure: start, end_measure: start + 7 });
      renderSections();
    }

    function removeSection(idx) {
      currentSong.sections.splice(idx, 1);
      renderSections();
    }

    async function saveSections() {
      const items = document.querySelectorAll('.section-item');
      const sections = Array.from(items).map((item, i) => ({
        name: item.querySelector('.section-name-input').value || `섹션 ${i + 1}`,
        start_measure: parseInt(item.querySelector('[data-field="start"]').value) || 1,
        end_measure: parseInt(item.querySelector('[data-field="end"]').value) || 8
      }));
      await api(`/api/songs/${currentSong.id}/sections`, { method: 'PUT', body: { sections } });
      await openSong(currentSong.id);
    }

    // ── Flow Editor ──
    function renderSectionButtons() {
      const container = document.getElementById('sectionButtons');
      const sections = currentSong.sections || [];
      container.innerHTML = sections.map(s =>
        `<button class="btn btn-sm btn-accent" onclick="addToFlow('${esc(s.name)}')">${esc(s.name)}</button>`
      ).join('');
    }

    function renderFlowEditor() {
      currentFlow = (currentSong.flow || []).map(f => f.section_name);
      const container = document.getElementById('flowEditor');
      if (currentFlow.length === 0) {
        container.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem">위의 섹션 버튼을 클릭하여 순서를 추가하세요</span>';

      }
      container.innerHTML = currentFlow.map((name, i) =>
        `<span class="flow-tag">${esc(name)} <span class="remove" onclick="removeFromFlow(${i})">✕</span></span>`
      ).join(' → ');
    }

    function addToFlow(name) {
      currentFlow.push(name);
      renderFlowFromArray();
    }

    function removeFromFlow(idx) {
      currentFlow.splice(idx, 1);
      renderFlowFromArray();
    }

    function clearFlow() { currentFlow = []; renderFlowFromArray(); }

    function renderFlowFromArray() {
      const container = document.getElementById('flowEditor');
      if (currentFlow.length === 0) {
        container.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem">위의 섹션 버튼을 클릭하여 순서를 추가하세요</span>';
        return;
      }
      container.innerHTML = currentFlow.map((name, i) =>
        `<span class="flow-tag">${esc(name)} <span class="remove" onclick="removeFromFlow(${i})">✕</span></span>`
      ).join('');
    }

    async function saveFlow() {
      await api(`/api/songs/${currentSong.id}/flow`, { method: 'PUT', body: { flow: currentFlow } });
      alert('곡 흐름이 저장되었습니다!');
    }

    // ── System Detection ──
    let _uploadedPdfCache = {};

    async function editExistingSystems(partId) {
      const systems = await (await fetch(`/api/parts/${partId}/systems`)).json();
      if (!systems.length) return alert('줄 데이터가 없습니다. 먼저 줄감지를 실행하세요.');
      showSystemEditModal(partId, systems);
    }

    async function detectSystems(partId) {
      const part = currentSong.parts.find(p => p.id === partId);
      if (!part) return;

      // 사용자에게 오선 묶기 수 물어보기
      const stavesPerSystem = parseInt(prompt(
        '시스템당 오선 수를 입력하세요:\n\n' +
        '• 드럼/보컬/단선 악보 → 1\n' +
        '• 기타 (표준보+TAB보) → 2\n' +
        '• 밴드스코어 (멜로디+기타1+기타2 등) → 3~5\n\n' +
        '잘 모르겠으면 1을 입력하세요.',
        '1'
      ));
      if (!stavesPerSystem || stavesPerSystem < 1) return;

      const statusEl = document.createElement('div');
      statusEl.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg-surface);padding:32px;border-radius:16px;z-index:2000;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow);';
      statusEl.innerHTML = '<div style="font-size:2rem;margin-bottom:12px">🔍</div><div>줄(시스템) 분석 중...</div><div style="color:var(--text-muted);font-size:0.85rem;margin-top:8px" id="detectProgress">PDF 로딩중...</div>';
      document.body.appendChild(statusEl);

      try {
        const pdf = await pdfjsLib.getDocument(`/uploads/${part.pdf_filename}`).promise;
        const allSystems = [];

        for (let pn = 1; pn <= pdf.numPages; pn++) {
          document.getElementById('detectProgress').textContent = `페이지 ${pn}/${pdf.numPages} 분석중...`;
          const page = await pdf.getPage(pn);
          const scale = 2;
          const vp = page.getViewport({ scale });
          const canvas = document.createElement('canvas');
          canvas.width = vp.width; canvas.height = vp.height;
          const ctx = canvas.getContext('2d');
          await page.render({ canvasContext: ctx, viewport: vp }).promise;

          const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const d = img.data, w = canvas.width, h = canvas.height;

          // Row dark pixel count
          const rowDark = new Array(h).fill(0);
          for (let y = 0; y < h; y++)
            for (let x = 0; x < w; x++)
              if ((d[(y * w + x) * 4] + d[(y * w + x) * 4 + 1] + d[(y * w + x) * 4 + 2]) / 3 < 100) rowDark[y]++;

          // Find staff lines (rows with >30% dark pixels)
          const threshold = w * 0.3;
          const staffLines = [];
          let gs = -1;
          for (let y = 0; y < h; y++) {
            if (rowDark[y] > threshold) { if (gs === -1) gs = y; }
            else if (gs !== -1) { staffLines.push({ y: Math.round((gs + y - 1) / 2) }); gs = -1; }
          }
          if (gs !== -1) staffLines.push({ y: Math.round((gs + h - 1) / 2) });

          // Group into individual staves (lines within 25px)
          const staves = [];
          let cur = [];
          for (let i = 0; i < staffLines.length; i++) {
            if (cur.length === 0) { cur.push(staffLines[i]); continue; }
            if (staffLines[i].y - cur[cur.length - 1].y < 25) cur.push(staffLines[i]);
            else {
              if (cur.length >= 3) staves.push({ top: cur[0].y, bottom: cur[cur.length - 1].y });
              cur = [staffLines[i]];
            }
          }
          if (cur.length >= 3) staves.push({ top: cur[0].y, bottom: cur[cur.length - 1].y });

          // N개의 오선을 1 시스템으로 묶기
          const systems = [];
          for (let si = 0; si < staves.length; si += stavesPerSystem) {
            const group = staves.slice(si, Math.min(si + stavesPerSystem, staves.length));
            if (group.length > 0) {
              systems.push({ top: group[0].top, bottom: group[group.length - 1].bottom });
            }
          }

          // Add padding: 코드(위) + 가사(아래) 포함하도록 여유있게
          const paddingTop = 45;    // 코드 기호 포함
          const paddingBottom = 40; // 가사 포함

          // 시스템 간 중간점 계산으로 자연스러운 영역 분할
          for (let idx = 0; idx < systems.length; idx++) {
            const sys = systems[idx];
            let topBound, bottomBound;

            if (idx === 0) {
              topBound = Math.max(0, sys.top - paddingTop);
            } else {
              // 이전 시스템과의 중간점
              topBound = Math.round((systems[idx - 1].bottom + sys.top) / 2);
            }

            if (idx === systems.length - 1) {
              bottomBound = Math.min(h, sys.bottom + paddingBottom);
            } else {
              // 다음 시스템과의 중간점
              bottomBound = Math.round((sys.bottom + systems[idx + 1].top) / 2);
            }

            allSystems.push({
              page_number: pn, system_index: idx,
              top_pct: parseFloat((topBound / h * 100).toFixed(1)),
              bottom_pct: parseFloat((bottomBound / h * 100).toFixed(1)),
              measures: 4,
              has_repeat_start: false,
              has_repeat_end: false
            });
          }
        }

        // Save to server
        await api(`/api/parts/${partId}/systems`, { method: 'PUT', body: { systems: allSystems } });
        document.body.removeChild(statusEl);

        // 줄 감지 결과 편집 모달 표시
        showSystemEditModal(partId, allSystems);
      } catch (err) {
        document.body.removeChild(statusEl);
        alert('줄 감지 실패: ' + err.message);
      }
    }

    function showSystemEditModal(partId, systems) {
      // 페이지별로 그룹화
      const pageGroups = {};
      systems.forEach(s => {
        if (!pageGroups[s.page_number]) pageGroups[s.page_number] = [];
        pageGroups[s.page_number].push(s);
      });

      let html = `<div class="modal-title">🔍 줄 감지 결과 (${systems.length}줄)</div>`;
      html += '<p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:16px">각 줄의 마디 수와 도돌이표를 설정하세요</p>';
      html += '<div style="max-height:60vh;overflow-y:auto;padding-right:8px">';

      for (const [page, sysList] of Object.entries(pageGroups)) {
        html += `<div style="margin-bottom:16px"><div style="font-weight:700;margin-bottom:8px;color:var(--primary)">📄 페이지 ${page}</div>`;
        html += '<table style="width:100%;border-collapse:collapse">';
        html += '<tr style="font-size:0.72rem;color:var(--text-muted)"><th style="text-align:left;padding:4px">줄</th><th style="padding:4px">마디수</th><th style="padding:4px">|:</th><th style="padding:4px">:|</th><th style="padding:4px">괄호</th><th style="padding:4px">괄호구간</th></tr>';
        sysList.forEach((s, i) => {
          const globalIdx = systems.indexOf(s);
          const v = s.volta || 0;
          const rs = s.repeat_start_at || 0;
          const re = s.repeat_end_at || 0;
          const vf = s.volta_from || 0;
          const vt = s.volta_to || 0;
          html += `<tr style="border-top:1px solid var(--border)">`;
          html += `<td style="padding:5px 4px;white-space:nowrap">줄${i + 1}</td>`;
          html += `<td style="padding:5px 3px;text-align:center"><input class="form-control" type="number" value="${s.measures}" min="1" max="20" style="width:65px;text-align:center;padding:4px" data-sys-idx="${globalIdx}" data-field="measures"></td>`;
          html += `<td style="padding:5px 3px;text-align:center"><input class="form-control" type="number" value="${rs}" min="0" max="20" style="width:55px;text-align:center;padding:4px" data-sys-idx="${globalIdx}" data-field="repeat_start" title="0=없음"></td>`;
          html += `<td style="padding:5px 3px;text-align:center"><input class="form-control" type="number" value="${re}" min="0" max="20" style="width:55px;text-align:center;padding:4px" data-sys-idx="${globalIdx}" data-field="repeat_end" title="0=없음"></td>`;
          html += `<td style="padding:5px 3px;text-align:center"><select data-sys-idx="${globalIdx}" data-field="volta" style="background:var(--bg-surface);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px;font-size:0.75rem"><option value="0" ${v === 0 ? 'selected' : ''}>-</option><option value="1" ${v === 1 ? 'selected' : ''}>1번</option><option value="2" ${v === 2 ? 'selected' : ''}>2번</option></select></td>`;
          html += `<td style="padding:5px 3px;text-align:center;white-space:nowrap"><input class="form-control" type="number" value="${vf}" min="0" max="20" style="width:45px;text-align:center;padding:4px;display:inline-block" data-sys-idx="${globalIdx}" data-field="volta_from" title="괄호 시작 마디 (0=줄 전체)">~<input class="form-control" type="number" value="${vt}" min="0" max="20" style="width:45px;text-align:center;padding:4px;display:inline-block" data-sys-idx="${globalIdx}" data-field="volta_to" title="괄호 끝 마디 (0=줄 전체)"></td>`;
          html += '</tr>';
        });
        html += '</table></div>';
      }

      html += '</div>';
      html += '<p style="color:var(--text-muted);font-size:0.72rem;margin-top:8px">|: = 반복시작 마디, :| = 반복끝 마디 (0=없음)<br>괄호: 1번=첫 통과만, 2번=둘째만. 괄호구간: 0~0이면 줄 전체<br>예) 4마디 중 3~4마디만 1번괄호 → 괄호:1번, 구간:3~4</p>';
      html += `<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">`;
      html += `<button class="btn btn-ghost" onclick="closeModal('editSongModal')">닫기</button>`;
      html += `<button class="btn btn-primary" onclick="saveSystemEdits('${partId}')">저장</button>`;
      html += '</div>';

      document.querySelector('#editSongModal .modal').innerHTML = html;
      showModal('editSongModal');
    }

    async function saveSystemEdits(partId) {
      const currentSystems = await (await fetch(`/api/parts/${partId}/systems`)).json();

      document.querySelectorAll('[data-sys-idx][data-field="measures"]').forEach(inp => {
        const idx = parseInt(inp.dataset.sysIdx);
        if (currentSystems[idx]) currentSystems[idx].measures = parseInt(inp.value) || 4;
      });
      document.querySelectorAll('[data-sys-idx][data-field="repeat_start"]').forEach(inp => {
        const idx = parseInt(inp.dataset.sysIdx);
        if (currentSystems[idx]) currentSystems[idx].repeat_start_at = parseInt(inp.value) || 0;
      });
      document.querySelectorAll('[data-sys-idx][data-field="repeat_end"]').forEach(inp => {
        const idx = parseInt(inp.dataset.sysIdx);
        if (currentSystems[idx]) currentSystems[idx].repeat_end_at = parseInt(inp.value) || 0;
      });
      document.querySelectorAll('[data-sys-idx][data-field="volta"]').forEach(inp => {
        const idx = parseInt(inp.dataset.sysIdx);
        if (currentSystems[idx]) currentSystems[idx].volta = parseInt(inp.value) || 0;
      });
      document.querySelectorAll('[data-sys-idx][data-field="volta_from"]').forEach(inp => {
        const idx = parseInt(inp.dataset.sysIdx);
        if (currentSystems[idx]) currentSystems[idx].volta_from = parseInt(inp.value) || 0;
      });
      document.querySelectorAll('[data-sys-idx][data-field="volta_to"]').forEach(inp => {
        const idx = parseInt(inp.dataset.sysIdx);
        if (currentSystems[idx]) currentSystems[idx].volta_to = parseInt(inp.value) || 0;
      });

      await api(`/api/parts/${partId}/systems`, { method: 'PUT', body: { systems: currentSystems } });
      closeModal('editSongModal');
      await openSong(currentSong.id);
    }

    // ── Playback Order ──
    let currentPlaybackOrder = [];

    function editPlaybackOrder(partId) {
      const part = currentSong.parts.find(p => p.id === partId);
      if (!part) return;
      currentPlaybackOrder = (part.playbackOrder && part.playbackOrder.length > 0)
        ? part.playbackOrder.map(o => o.page_number)
        : Array.from({ length: part.total_pages }, (_, i) => i + 1);

      let html = `<div class="modal-title">↻ 재생 경로 - ${esc(part.name)}</div>`;
      html += '<p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:12px">페이지 버튼을 클릭해서 재생 순서를 추가하세요. 도돌이표 등의 반복을 설정할 수 있습니다.</p>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">';
      for (let i = 1; i <= part.total_pages; i++) {
        html += `<button class="btn btn-sm btn-accent" onclick="addPageToOrder(${i})">P${i}</button>`;
      }
      html += '</div>';
      html += `<div id="playbackOrderDisplay" class="flow-editor" style="min-height:50px"></div>`;
      html += `<div style="display:flex;gap:8px;margin-top:12px">`;
      html += `<button class="btn btn-ghost btn-sm" onclick="currentPlaybackOrder=[];renderPlaybackOrder()">🔄 초기화</button>`;
      html += `<button class="btn btn-ghost btn-sm" onclick="currentPlaybackOrder=Array.from({length:${part.total_pages}},(_,i)=>i+1);renderPlaybackOrder()">📋 순서대로</button>`;
      html += '</div>';
      html += `<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">`;
      html += `<button class="btn btn-ghost" onclick="closeModal('editSongModal')">취소</button>`;
      html += `<button class="btn btn-primary" onclick="savePlaybackOrder('${partId}')">저장</button>`;
      html += '</div>';

      document.querySelector('#editSongModal .modal').innerHTML = html;
      showModal('editSongModal');
      renderPlaybackOrder();
    }

    function addPageToOrder(pageNum) {
      currentPlaybackOrder.push(pageNum);
      renderPlaybackOrder();
    }

    function removeFromOrder(idx) {
      currentPlaybackOrder.splice(idx, 1);
      renderPlaybackOrder();
    }

    function renderPlaybackOrder() {
      const container = document.getElementById('playbackOrderDisplay');
      if (!container) return;
      if (currentPlaybackOrder.length === 0) {
        container.innerHTML = '<span style="color:var(--text-muted);font-size:0.85rem">페이지 버튼을 클릭하여 순서를 추가하세요</span>';
        return;
      }
      container.innerHTML = currentPlaybackOrder.map((p, i) =>
        `<span class="flow-tag">P${p} <span class="remove" onclick="removeFromOrder(${i})">✕</span></span>`
      ).join('');
    }

    async function savePlaybackOrder(partId) {
      await api(`/api/parts/${partId}/playback-order`, { method: 'PUT', body: { order: currentPlaybackOrder } });
      closeModal('editSongModal');
      await openSong(currentSong.id);
    }

    // ── Init ──
    loadSongs();
  </script>
