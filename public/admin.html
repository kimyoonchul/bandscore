<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backstage — 관리자</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #f43f5e;
      --accent2: #fbbf24;
      --bg: #000;
      --bg-card: #0d0d0d;
      --bg-elevated: #1a1a1a;
      --bg-surface: #111;
      --border: rgba(255,255,255,0.07);
      --text: #f0ece6;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      --gradient: linear-gradient(135deg, #f43f5e 0%, #fbbf24 100%);
      --radius: 0.75rem;
      --radius-lg: 1rem;
      --ease: cubic-bezier(0.4,0,0.2,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100%; }

    .header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.875rem 1.5rem;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .logo { display: flex; align-items: center; gap: 0.625rem; font-weight: 900; font-size: 1.1rem; letter-spacing: -0.02em; }
    .logo-badge {
      background: var(--gradient);
      color: #000; font-size: 0.6rem; font-weight: 800;
      padding: 0.15rem 0.5rem; border-radius: 0.375rem;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .admin-user { font-size: 0.78rem; color: var(--text-muted); }
    .admin-user span { color: var(--text-secondary); }
    .btn-logout {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 0.35rem 0.75rem; border-radius: 0.5rem; cursor: pointer;
      font-size: 0.75rem; font-family: inherit; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Tabs ── */
    .tab-bar {
      flex-shrink: 0;
      display: flex; gap: 0.25rem;
      padding: 0.75rem 1.5rem 0;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.5);
    }
    .tab {
      padding: 0.5rem 1.25rem; border: none; background: transparent;
      color: var(--text-muted); font-family: inherit; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 0.2s; border-radius: 0.5rem 0.5rem 0 0;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 1.5rem; }

    /* ── Stat Cards ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1rem; text-align: center;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: rgba(244,63,94,0.3); }
    .stat-num {
      font-size: 2.2rem; font-weight: 900;
      background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }
    .stat-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.375rem; }

    /* ── Section ── */
    .section-title {
      font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 0.875rem; margin-top: 1.5rem;
    }
    .section-title:first-child { margin-top: 0; }

    /* ── Table ── */
    .table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .search-bar { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; }
    .search-bar input {
      flex: 1; background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 0.5rem; color: var(--text); padding: 0.5rem 0.875rem;
      font-size: 0.82rem; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: rgba(244,63,94,0.4); }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--bg-elevated); padding: 0.625rem 1rem; text-align: left; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    td { padding: 0.75rem 1rem; font-size: 0.8rem; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 0.375rem;
      font-size: 0.65rem; font-weight: 700;
    }
    .badge-admin { background: rgba(244,63,94,0.15); color: #f43f5e; }
    .badge-user { background: rgba(161,161,170,0.15); color: #a1a1aa; }
    .badge-editor { background: rgba(251,191,36,0.15); color: #fbbf24; }

    /* ── Action Buttons ── */
    .btn-danger-sm {
      background: rgba(244,63,94,0.1); color: #f43f5e;
      border: 1px solid rgba(244,63,94,0.25); border-radius: 0.375rem;
      padding: 0.25rem 0.625rem; font-size: 0.72rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .btn-danger-sm:hover { background: rgba(244,63,94,0.2); border-color: #f43f5e; }
    .text-muted { color: var(--text-muted); }
    .text-small { font-size: 0.72rem; }

    /* ── Recent User List ── */
    .recent-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .recent-item {
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--bg-elevated); border-radius: 0.5rem;
      padding: 0.625rem 0.875rem;
    }
    .avatar {
      width: 2rem; height: 2rem; border-radius: 50%;
      background: var(--gradient); display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem; font-weight: 800; color: #000;
      flex-shrink: 0;
    }
    .recent-info { flex: 1; min-width: 0; }
    .recent-name { font-size: 0.82rem; font-weight: 600; }
    .recent-email { font-size: 0.7rem; color: var(--text-muted); }
    .recent-time { font-size: 0.68rem; color: var(--text-muted); white-space: nowrap; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.85rem; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 2rem; color: var(--text-muted); }

    /* ── Access Denied ── */
    #accessDenied {
      display: none; position: fixed; inset: 0;
      background: var(--bg); z-index: 999;
      flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
    }
    #accessDenied .icon { font-size: 4rem; }
    #accessDenied h1 { font-size: 1.5rem; font-weight: 800; }
    #accessDenied p { color: var(--text-muted); font-size: 0.9rem; }
    #accessDenied a { color: var(--accent); text-decoration: none; font-weight: 600; }

    /* ── File Size ── */
    .size-bar { display: flex; align-items: center; gap: 0.5rem; }
    .size-pill { font-size: 0.68rem; color: var(--text-muted); }

    /* ── DM Slide Panel ── */
    .dm-panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: 360px;
      background: var(--bg-surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.3s var(--ease);
      z-index: 500;
      box-shadow: -8px 0 32px rgba(0,0,0,0.4);
    }
    .dm-panel.open { transform: translateX(0); }
    .dm-header {
      flex-shrink: 0; padding: 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.75rem;
    }
    .dm-header .avatar { width: 2.25rem; height: 2.25rem; font-size: 0.8rem; }
    .dm-title { flex: 1; min-width: 0; }
    .dm-title strong { display: block; font-size: 0.9rem; }
    .dm-title small { color: var(--text-muted); font-size: 0.72rem; }
    .dm-close {
      background: none; border: none; color: var(--text-muted);
      font-size: 1.2rem; cursor: pointer; padding: 0.25rem;
      border-radius: 0.375rem; transition: color 0.2s;
    }
    .dm-close:hover { color: var(--text); }
    .dm-messages {
      flex: 1; overflow-y: auto; padding: 0.875rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .dm-bubble { display: flex; flex-direction: column; }
    .dm-bubble.me { align-items: flex-end; }
    .dm-bubble.other { align-items: flex-start; }
    .dm-bubble .bubble {
      max-width: 80%; padding: 0.5rem 0.75rem;
      border-radius: 1rem; font-size: 0.82rem; line-height: 1.45; word-break: break-word;
    }
    .dm-bubble.me .bubble { background: #f43f5e; color: #fff; border-radius: 1rem 1rem 0.25rem 1rem; }
    .dm-bubble.other .bubble { background: var(--bg-elevated); color: var(--text); border-radius: 1rem 1rem 1rem 0.25rem; }
    .dm-bubble .btime { font-size: 0.6rem; color: var(--text-muted); margin-top: 0.2rem; }
    .dm-input-bar {
      flex-shrink: 0; padding: 0.75rem; border-top: 1px solid var(--border);
      display: flex; gap: 0.5rem;
    }
    .dm-input {
      flex: 1; background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 1.5rem; color: var(--text); padding: 0.5rem 1rem;
      font-size: 0.82rem; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .dm-input:focus { border-color: rgba(244,63,94,0.4); }
    .dm-send {
      background: var(--gradient); color: #000; border: none;
      border-radius: 50%; width: 2.25rem; height: 2.25rem;
      font-size: 0.9rem; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .dm-send:hover { transform: scale(1.1); }
    .btn-dm-sm {
      background: rgba(244,63,94,0.08); color: #f43f5e;
      border: 1px solid rgba(244,63,94,0.2); border-radius: 0.375rem;
      padding: 0.25rem 0.5rem; font-size: 0.7rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.2s; margin-right: 0.3rem;
    }
    .btn-dm-sm:hover { background: rgba(244,63,94,0.18); }
    .btn-edit-sm {
      background: rgba(251,191,36,0.08); color: #fbbf24;
      border: 1px solid rgba(251,191,36,0.2); border-radius: 0.375rem;
      padding: 0.25rem 0.5rem; font-size: 0.7rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.2s; margin-right: 0.3rem;
    }
    .btn-edit-sm:hover { background: rgba(251,191,36,0.18); }
    /* ── Edit Modal ── */
    .edit-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 600;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .edit-overlay.open { display: flex; }
    .edit-modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.5rem;
      width: 100%; max-width: 420px; margin: 1rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .edit-modal h3 { font-size: 1rem; font-weight: 800; margin-bottom: 1.25rem; }
    .edit-field { margin-bottom: 1rem; }
    .edit-field label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.375rem; }
    .edit-field input, .edit-field select {
      width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 0.5rem; color: var(--text); padding: 0.5rem 0.875rem;
      font-size: 0.85rem; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .edit-field input:focus, .edit-field select:focus { border-color: rgba(251,191,36,0.5); }
    .edit-field input::placeholder { color: var(--text-muted); }
    .edit-hint { font-size: 0.68rem; color: var(--text-muted); margin-top: 0.25rem; }
    .edit-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.25rem; }
    .btn-cancel {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;
      font-size: 0.82rem; font-family: inherit; transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    .btn-save {
      background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000;
      border: none; padding: 0.5rem 1.25rem; border-radius: 0.5rem;
      cursor: pointer; font-size: 0.82rem; font-weight: 700; font-family: inherit;
      transition: all 0.2s;
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(251,191,36,0.3); }
    .edit-divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>

<!-- 접근 불가 화면 -->
<div id="accessDenied">
  <div class="icon">🚫</div>
  <h1>접근 권한 없음</h1>
  <p>관리자만 접근 가능한 페이지입니다.</p>
  <a href="/">← 홈으로 돌아가기</a>
</div>

<div class="app" id="app" style="display:none">
  <header class="header">
    <div class="logo">
      <span style="background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Backstage</span>
      <span class="logo-badge">Admin</span>
    </div>
    <div class="admin-user">관리자: <span id="adminEmail"></span></div>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </header>

  <div class="tab-bar">
    <button class="tab active" id="tab-dashboard" onclick="switchTab('dashboard')">📊 대시보드</button>
    <button class="tab" id="tab-users" onclick="switchTab('users')">👥 회원 관리</button>
    <button class="tab" id="tab-stages" onclick="switchTab('stages')">🎭 Stage 관리</button>
    <button class="tab" id="tab-songs" onclick="switchTab('songs')">🎵 곡 관리</button>
  </div>

  <div class="content">

    <!-- 대시보드 탭 -->
    <div id="panel-dashboard">
      <div class="stats-grid" id="statsGrid">
        <div class="loading">통계 불러오는 중...</div>
      </div>
      <div class="section-title">최근 가입 회원</div>
      <div class="recent-list" id="recentUsers"></div>
    </div>

    <!-- 회원 관리 탭 -->
    <div id="panel-users" style="display:none">
      <div class="table-wrap">
        <div class="search-bar">
          <input type="text" id="userSearch" placeholder="이메일, 닉네임으로 검색..." oninput="filterUsers()">
        </div>
        <table>
          <thead><tr>
            <th>닉네임</th>
            <th>이메일</th>
            <th>역할</th>
            <th>가입 Stage 수</th>
            <th>가입일</th>
            <th>마지막 로그인</th>
            <th>관리</th>
          </tr></thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Stage 관리 탭 -->
    <div id="panel-stages" style="display:none">
      <div class="table-wrap">
        <div class="search-bar">
          <input type="text" id="stageSearch" placeholder="Stage 이름으로 검색..." oninput="filterStages()">
        </div>
        <table>
          <thead><tr>
            <th>Stage 이름</th>
            <th>생성자</th>
            <th>멤버</th>
            <th>곡</th>
            <th>채팅 수</th>
            <th>초대코드</th>
            <th>생성일</th>
            <th>관리</th>
          </tr></thead>
          <tbody id="stagesTable"></tbody>
        </table>
      </div>
    </div>

    <!-- 곡 관리 탭 -->
    <div id="panel-songs" style="display:none">
      <div class="table-wrap">
        <div class="search-bar">
          <input type="text" id="songSearch" placeholder="곡 이름으로 검색..." oninput="filterSongs()">
        </div>
        <table>
          <thead><tr>
            <th>곡 이름</th>
            <th>Stage</th>
            <th>BPM</th>
            <th>파트 수</th>
            <th>파일 크기</th>
            <th>등록일</th>
            <th>관리</th>
          </tr></thead>
          <tbody id="songsTable"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- 편집 모달 -->
<div class="edit-overlay" id="editOverlay" onclick="if(event.target===this)closeEditModal()">
  <div class="edit-modal">
    <h3 id="editModalTitle">✅ 정보 수정</h3>
    <div id="editModalBody"></div>
    <div class="edit-actions">
      <button class="btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn-save" id="editSaveBtn">&#128190; 저장</button>
    </div>
  </div>
</div>

<!-- DM 슬라이드 패널 -->
<div class="dm-panel" id="dmPanel">
  <div class="dm-header">
    <div class="avatar" id="dmAvatar"></div>
    <div class="dm-title">
      <strong id="dmTargetName"></strong>
      <small id="dmTargetEmail"></small>
    </div>
    <button class="dm-close" onclick="closeDmPanel()">✕</button>
  </div>
  <div class="dm-messages" id="dmMessages"></div>
  <div class="dm-input-bar">
    <input class="dm-input" id="dmInput" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAdminDm();}">
    <button class="dm-send" onclick="sendAdminDm()">↑</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const TOKEN_KEY = 'backstage_token';
  const USER_KEY = 'backstage_user';
  const ADMIN_EMAIL = 'chuli8944@gmail.com';

  let allUsers = [], allStages = [], allSongs = [];

  // ── 인증 체크 ──
  function init() {
    const token = localStorage.getItem(TOKEN_KEY);
    const userStr = localStorage.getItem(USER_KEY);
    if (!token || !userStr) {
      window.location.href = '/login';
      return;
    }
    try {
      const user = JSON.parse(userStr);
      if (user.email !== ADMIN_EMAIL && user.role !== 'admin') {
        document.getElementById('accessDenied').style.display = 'flex';
        return;
      }
      document.getElementById('adminEmail').textContent = user.email;
      document.getElementById('app').style.display = 'flex';
      loadDashboard();
    } catch(e) {
      window.location.href = '/login';
    }
  }

  function getHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem(TOKEN_KEY) };
  }

  function logout() {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(USER_KEY);
    window.location.href = '/login';
  }

  // ── 탭 전환 ──
  let currentTab = 'dashboard';
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    ['dashboard','users','stages','songs'].forEach(p => {
      document.getElementById('panel-' + p).style.display = p === tab ? '' : 'none';
    });
    currentTab = tab;
    if (tab === 'users') loadUsers();
    else if (tab === 'stages') loadStages();
    else if (tab === 'songs') loadSongs();
  }

  // ── 날짜 포맷 ──
  function fmtDate(d) {
    if (!d) return '-';
    return new Date(d).toLocaleDateString('ko-KR', { year: '2-digit', month: '2-digit', day: '2-digit' });
  }
  function fmtSize(bytes) {
    if (!bytes) return '-';
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
    return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
  }

  // ── 대시보드 ──
  async function loadDashboard() {
    try {
      const res = await fetch('/api/admin/stats', { headers: getHeaders() });
      if (!res.ok) throw new Error();
      const data = await res.json();
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-num">${data.userCount}</div><div class="stat-label">전체 회원</div></div>
        <div class="stat-card"><div class="stat-num">${data.stageCount}</div><div class="stat-label">전체 Stage</div></div>
        <div class="stat-card"><div class="stat-num">${data.songCount}</div><div class="stat-label">전체 곡</div></div>
        <div class="stat-card"><div class="stat-num">${data.partCount}</div><div class="stat-label">전체 파트</div></div>
        <div class="stat-card"><div class="stat-num">${data.msgCount}</div><div class="stat-label">채팅 메시지</div></div>
        <div class="stat-card"><div class="stat-num">${data.dmCount}</div><div class="stat-label">DM 메시지</div></div>
      `;
      const recent = document.getElementById('recentUsers');
      if (!data.recentUsers.length) {
        recent.innerHTML = '<div class="empty">가입한 회원이 없습니다</div>';
        return;
      }
      recent.innerHTML = data.recentUsers.map(u => `
        <div class="recent-item">
          <div class="avatar">${(u.nickname || u.email)[0].toUpperCase()}</div>
          <div class="recent-info">
            <div class="recent-name">${esc(u.nickname || '?')} ${u.role === 'admin' ? '<span class="badge badge-admin">관리자</span>' : ''}</div>
            <div class="recent-email">${esc(u.email)}</div>
          </div>
          <div class="recent-time">${fmtDate(u.created_at)}</div>
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('statsGrid').innerHTML = '<div class="empty">통계를 불러올 수 없습니다</div>';
    }
  }

  // ── 회원 관리 ──
  async function loadUsers() {
    const tbody = document.getElementById('usersTable');
    tbody.innerHTML = '<tr><td colspan="7" class="loading">불러오는 중...</td></tr>';
    try {
      const res = await fetch('/api/admin/users', { headers: getHeaders() });
      allUsers = await res.json();
      renderUsers(allUsers);
    } catch(e) { tbody.innerHTML = '<tr><td colspan="7" class="empty">불러오기 실패</td></tr>'; }
  }

  function renderUsers(users) {
    const tbody = document.getElementById('usersTable');
    if (!users.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">회원이 없습니다</td></tr>'; return; }
    tbody.innerHTML = users.map(u => `
      <tr>
        <td><strong>${esc(u.nickname || '-')}</strong></td>
        <td class="text-small">${esc(u.email)}</td>
        <td><span class="badge badge-${u.role || 'user'}">${u.role === 'admin' ? '관리자' : '일반'}</span></td>
        <td class="text-muted">${u.stage_count}개</td>
        <td class="text-small text-muted">${fmtDate(u.created_at)}</td>
        <td class="text-small text-muted">${u.last_login ? fmtDate(u.last_login) : '-'}</td>
        <td>
          <button class="btn-edit-sm" onclick="editUser('${u.id}')">&#9998; 편집</button>
          ${u.email !== ADMIN_EMAIL ? `<button class="btn-dm-sm" onclick="openDmPanel('${u.id}','${esc(u.nickname||u.email)}','${esc(u.email)}')">💬 DM</button><button class="btn-danger-sm" onclick="deleteUser('${u.id}','${esc(u.nickname||u.email)}')">🗑 삭제</button>` : '<span class="text-muted text-small">보호됨</span>'}
        </td>
      </tr>
    `).join('');
  }

  function filterUsers() {
    const q = document.getElementById('userSearch').value.toLowerCase();
    renderUsers(allUsers.filter(u => (u.email+u.nickname).toLowerCase().includes(q)));
  }

  // ── 편집 모달 ──
  function closeEditModal() {
    document.getElementById('editOverlay').classList.remove('open');
  }

  function editUser(id) {
    const u = allUsers.find(x => x.id === id);
    if (!u) return;
    document.getElementById('editModalTitle').textContent = '회원 정보 수정: ' + (u.nickname || u.email);
    document.getElementById('editModalBody').innerHTML = `
      <div class="edit-field">
        <label>닉네임</label>
        <input id="ef_nickname" value="${esc(u.nickname||'')}" placeholder="닉네임">
      </div>
      <div class="edit-field">
        <label>이메일</label>
        <input id="ef_email" type="email" value="${esc(u.email||'')}" placeholder="이메일">
        <p class="edit-hint">⚠️ 이메일은 로그인 ID입니다. 신중하게 변경하세요.</p>
      </div>
      <div class="edit-field">
        <label>역할</label>
        <select id="ef_role">
          <option value="user" ${u.role!=='admin'?'selected':''}>&#128101; 일반</option>
          <option value="admin" ${u.role==='admin'?'selected':''}>⭐ 관리자</option>
        </select>
      </div>
      <hr class="edit-divider">
      <div class="edit-field">
        <label>비밀번호 재설정 <span style="color:var(--text-muted);font-weight:400">(6자 이상, 비워두면 변경 안함)</span></label>
        <input id="ef_password" type="password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022 (6자 이상)">
      </div>
    `;
    document.getElementById('editSaveBtn').onclick = () => saveUser(u.id);
    document.getElementById('editOverlay').classList.add('open');
    document.getElementById('ef_nickname').focus();
  }

  async function saveUser(id) {
    const nickname = document.getElementById('ef_nickname').value.trim();
    const email = document.getElementById('ef_email').value.trim();
    const role = document.getElementById('ef_role').value;
    const password = document.getElementById('ef_password').value;
    if (!nickname) { alert('닉네임을 입력하세요'); return; }
    if (!email) { alert('이메일을 입력하세요'); return; }
    const body = { nickname, email, role };
    if (password) body.password = password;
    try {
      const res = await fetch(`/api/admin/users/${id}`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { alert(data.error || '저장 실패'); return; }
      closeEditModal();
      loadUsers();
    } catch(e) { alert('오류 발생'); }
  }

  function editStage(id) {
    const s = allStages.find(x => x.id === id);
    if (!s) return;
    document.getElementById('editModalTitle').textContent = 'Stage 수정: ' + s.name;
    document.getElementById('editModalBody').innerHTML = `
      <div class="edit-field">
        <label>Stage 이름</label>
        <input id="ef_sname" value="${esc(s.name||'')}" placeholder="Stage 이름" maxlength="30">
      </div>
      <div class="edit-field">
        <label>설명</label>
        <input id="ef_sdesc" value="${esc(s.description||'')}" placeholder="내용 없음">
      </div>
      <div class="edit-field">
        <label>을(invite code)</label>
        <input value="${esc(s.invite_code||'')}" readonly style="opacity:0.5;cursor:not-allowed">
        <p class="edit-hint">저장시 자동으로 유지됩니다. &nbsp; <label style="cursor:pointer"><input type="checkbox" id="ef_reginvite"> ✔ 새 코드로 재발급</label></p>
      </div>
    `;
    document.getElementById('editSaveBtn').onclick = () => saveStage(s.id);
    document.getElementById('editOverlay').classList.add('open');
    document.getElementById('ef_sname').focus();
  }

  async function saveStage(id) {
    const name = document.getElementById('ef_sname').value.trim();
    const description = document.getElementById('ef_sdesc').value.trim();
    const regenerateInvite = document.getElementById('ef_reginvite').checked;
    if (!name) { alert('Stage 이름을 입력하세요'); return; }
    try {
      const res = await fetch(`/api/admin/stages/${id}`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ name, description, regenerateInvite }) });
      const data = await res.json();
      if (!res.ok) { alert(data.error || '저장 실패'); return; }
      closeEditModal();
      loadStages();
    } catch(e) { alert('오류 발생'); }
  }

  function editSong(id) {
    const s = allSongs.find(x => x.id === id);
    if (!s) return;
    document.getElementById('editModalTitle').textContent = '곡 수정: ' + s.name;
    document.getElementById('editModalBody').innerHTML = `
      <div class="edit-field">
        <label>곳 이름</label>
        <input id="ef_songname" value="${esc(s.name||'')}" placeholder="곳 이름">
      </div>
      <div class="edit-field">
        <label>BPM</label>
        <input id="ef_bpm" type="number" min="20" max="400" value="${s.bpm||120}">
      </div>
      <div class="edit-field">
        <label>박자 (Time Signature)</label>
        <select id="ef_timesig">
          ${['2/4','3/4','4/4','6/8','12/8'].map(t => `<option value="${t}" ${s.time_signature===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    `;
    document.getElementById('editSaveBtn').onclick = () => saveSong(s.id);
    document.getElementById('editOverlay').classList.add('open');
    document.getElementById('ef_songname').focus();
  }

  async function saveSong(id) {
    const name = document.getElementById('ef_songname').value.trim();
    const bpm = document.getElementById('ef_bpm').value;
    const time_signature = document.getElementById('ef_timesig').value;
    if (!name) { alert('곳 이름을 입력하세요'); return; }
    try {
      const res = await fetch(`/api/admin/songs/${id}`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify({ name, bpm, time_signature }) });
      const data = await res.json();
      if (!res.ok) { alert(data.error || '저장 실패'); return; }
      closeEditModal();
      loadSongs();
    } catch(e) { alert('오류 발생'); }
  }

  async function deleteUser(id, name) {
    if (!confirm(`"${name}" 계정을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
    const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE', headers: getHeaders() });
    if (res.ok) { loadUsers(); loadDashboard(); }
    else { const e = await res.json(); alert(e.error); }
  }

  // ── Stage 관리 ──
  async function loadStages() {
    const tbody = document.getElementById('stagesTable');
    tbody.innerHTML = '<tr><td colspan="8" class="loading">불러오는 중...</td></tr>';
    try {
      const res = await fetch('/api/admin/stages', { headers: getHeaders() });
      allStages = await res.json();
      renderStages(allStages);
    } catch(e) { tbody.innerHTML = '<tr><td colspan="8" class="empty">불러오기 실패</td></tr>'; }
  }

  function renderStages(stages) {
    const tbody = document.getElementById('stagesTable');
    if (!stages.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty">Stage가 없습니다</td></tr>'; return; }
    tbody.innerHTML = stages.map(s => `
      <tr>
        <td><strong>${esc(s.name)}</strong>${s.description ? `<div class="text-small text-muted">${esc(s.description)}</div>` : ''}</td>
        <td class="text-small">${esc(s.creator_nickname || '-')}<div class="text-small text-muted">${esc(s.creator_email || '')}</div></td>
        <td class="text-muted">${s.member_count}명</td>
        <td class="text-muted">${s.song_count}곡</td>
        <td class="text-muted">${s.msg_count}개</td>
        <td><code style="font-size:0.72rem;color:var(--accent2);background:rgba(251,191,36,0.08);padding:0.15rem 0.4rem;border-radius:0.25rem">${s.invite_code}</code></td>
        <td class="text-small text-muted">${fmtDate(s.created_at)}</td>
        <td><button class="btn-edit-sm" onclick="editStage('${s.id}')">&#9998; 편집</button><button class="btn-danger-sm" onclick="deleteStage('${s.id}','${esc(s.name)}')">🗑 삭제</button></td>
      </tr>
    `).join('');
  }

  function filterStages() {
    const q = document.getElementById('stageSearch').value.toLowerCase();
    renderStages(allStages.filter(s => s.name.toLowerCase().includes(q)));
  }

  async function deleteStage(id, name) {
    if (!confirm(`"${name}" Stage를 삭제하시겠습니까?\n모든 멤버십, 곡 연결이 삭제됩니다.`)) return;
    const res = await fetch(`/api/admin/stages/${id}`, { method: 'DELETE', headers: getHeaders() });
    if (res.ok) { loadStages(); loadDashboard(); }
    else { const e = await res.json(); alert(e.error); }
  }

  // ── 곡 관리 ──
  async function loadSongs() {
    const tbody = document.getElementById('songsTable');
    tbody.innerHTML = '<tr><td colspan="7" class="loading">불러오는 중...</td></tr>';
    try {
      const res = await fetch('/api/admin/songs', { headers: getHeaders() });
      allSongs = await res.json();
      renderSongs(allSongs);
    } catch(e) { tbody.innerHTML = '<tr><td colspan="7" class="empty">불러오기 실패</td></tr>'; }
  }

  function renderSongs(songs) {
    const tbody = document.getElementById('songsTable');
    if (!songs.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">등록된 곡이 없습니다</td></tr>'; return; }
    // 파일 크기 기준 정렬 (큰 순)
    const sorted = [...songs].sort((a,b) => (b.total_size||0) - (a.total_size||0));
    tbody.innerHTML = sorted.map(s => `
      <tr>
        <td><strong>${esc(s.name)}</strong></td>
        <td class="text-small text-muted">${esc(s.stage_name || '-')}</td>
        <td class="text-muted">${s.bpm}</td>
        <td class="text-muted">${s.part_count}개</td>
        <td class="size-bar">
          <span class="size-pill" style="color:${s.total_size > 5*1024*1024 ? '#f43f5e' : s.total_size > 1*1024*1024 ? '#fbbf24' : 'var(--text-muted)'}">${fmtSize(s.total_size)}</span>
        </td>
        <td class="text-small text-muted">${fmtDate(s.created_at)}</td>
        <td>
          <button class="btn-edit-sm" onclick="editSong('${s.id}')">&#9998; 편집</button>
          <a class="btn-edit-sm" style="text-decoration:none;display:inline-block;" href="/?song_id=${s.id}" target="_blank">⚙️ 악보설정</a>
          <button class="btn-danger-sm" onclick="deleteSong('${s.id}','${esc(s.name)}')">🗑 삭제</button>
        </td>
      </tr>
    `).join('');
  }

  function filterSongs() {
    const q = document.getElementById('songSearch').value.toLowerCase();
    renderSongs(allSongs.filter(s => s.name.toLowerCase().includes(q)));
  }

  async function deleteSong(id, name) {
    if (!confirm(`"${name}" 곡을 삭제하시겠습니까?\n관련 파일(PDF, 커버)도 모두 삭제됩니다.`)) return;
    const res = await fetch(`/api/admin/songs/${id}`, { method: 'DELETE', headers: getHeaders() });
    if (res.ok) { loadSongs(); loadDashboard(); }
    else { const e = await res.json(); alert(e.error); }
  }

  // ── 관리자 DM ──
  let dmTargetId = null;
  let dmSocket = null;

  function openDmPanel(userId, name, email) {
    dmTargetId = userId;
    document.getElementById('dmAvatar').textContent = name[0].toUpperCase();
    document.getElementById('dmTargetName').textContent = name;
    document.getElementById('dmTargetEmail').textContent = email;
    document.getElementById('dmPanel').classList.add('open');
    document.getElementById('dmInput').focus();
    loadDmMessages(userId);
    // 소켓 연결
    if (!dmSocket) {
      dmSocket = io();
      dmSocket.emit('join-dm', JSON.parse(localStorage.getItem(USER_KEY)).id);
      dmSocket.on('dm-message', (msg) => {
        if ((msg.sender_id === dmTargetId) || (msg.receiver_id === dmTargetId)) {
          appendDmBubble(msg);
        }
      });
    }
  }

  function closeDmPanel() {
    document.getElementById('dmPanel').classList.remove('open');
    dmTargetId = null;
  }

  async function loadDmMessages(userId) {
    const container = document.getElementById('dmMessages');
    container.innerHTML = '<div class="loading">불러오는 중...</div>';
    try {
      const res = await fetch(`/api/dm/${userId}`, { headers: getHeaders() });
      const msgs = await res.json();
      const me = JSON.parse(localStorage.getItem(USER_KEY)).id;
      container.innerHTML = '';
      msgs.forEach(m => appendDmBubble(m, me));
      container.scrollTop = container.scrollHeight;
    } catch(e) { container.innerHTML = '<div class="empty">메시지를 불러올 수 없습니다</div>'; }
  }

  function appendDmBubble(m, meId) {
    const container = document.getElementById('dmMessages');
    if (!meId) meId = JSON.parse(localStorage.getItem(USER_KEY)).id;
    const isMe = m.sender_id === meId;
    const el = document.createElement('div');
    el.className = 'dm-bubble ' + (isMe ? 'me' : 'other');
    const time = m.created_at ? new Date(m.created_at + (m.created_at.includes('Z') ? '' : 'Z')).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) : '';
    el.innerHTML = `<div class="bubble">${esc(m.message)}</div><span class="btime">${time}</span>`;
    container.appendChild(el);
    container.scrollTop = container.scrollHeight;
  }

  async function sendAdminDm() {
    if (!dmTargetId) return;
    const input = document.getElementById('dmInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    try {
      const res = await fetch(`/api/dm/${dmTargetId}`, {
        method: 'POST', headers: getHeaders(),
        body: JSON.stringify({ message: msg })
      });
      if (res.ok) {
        const saved = await res.json();
        appendDmBubble(saved);
      }
    } catch(e) { input.value = msg; alert('전송 실패'); }
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
